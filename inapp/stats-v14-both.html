<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac.fm — Stats v14 (both states)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:wght@500;600&family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:#dedbd4; font-family:'Inter',-apple-system,sans-serif; -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:28px 16px 40px;}
  .pair{display:flex; flex-wrap:wrap; gap:28px; justify-content:center; align-items:flex-start;}
  .one{display:flex; flex-direction:column; align-items:center; gap:12px;}
  .cap{font-family:'Newsreader',Georgia,serif; font-size:18px; font-weight:600; color:#1b1720; letter-spacing:-.01em;}
  .cap .k{display:inline-block; font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:.04em;
    text-transform:uppercase; padding:3px 9px; border-radius:20px; margin-left:8px; vertical-align:middle;}
  .cap .k.low{color:#b3382f; background:#f7e9e7;}
  .cap .k.ok{color:#2f7a4a; background:#e7f1ea;}
  iframe{width:430px; height:1580px; border:0; background:transparent; display:block;}
  @media(max-width:920px){ iframe{width:400px;} }
</style>
</head>
<body>
  <div class="pair">
    <div class="one">
      <div class="cap">One frequency low <span class="k low">below level</span></div>
      <iframe src="stats-v14.html#full-bare-low" scrolling="no"></iframe>
    </div>
    <div class="one">
      <div class="cap">On track <span class="k ok">leveled</span></div>
      <iframe src="stats-v14.html#full-bare-ok" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>
