<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Immersions — Zodiac.fm (reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbf8f3; --ink:#121314; --smoke:#555; --fog:#888; --mist:#e7e1d8; --card:#fff;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --c:#2832e0; --c2:#b402ff;            /* active domain colors (set by JS) */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#ede7df;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:24px 0;min-height:100vh}
  .phone{width:402px;max-width:100%;background:var(--paper);min-height:850px;position:relative;padding-bottom:96px;box-shadow:0 24px 60px rgba(0,0,0,.18);border-radius:28px;overflow:hidden;transition:background .3s}
  .top{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 6px}
  .wm{font-family:var(--serif);font-size:21px;font-weight:500;letter-spacing:-.01em}.wm b{font-weight:600}
  .burger{display:flex;flex-direction:column;gap:4px}.burger i{width:22px;height:2px;background:var(--ink);border-radius:2px}
  /* tabs */
  .tabs{display:flex;gap:6px;padding:12px 16px 4px}
  .tab{flex:1 1 0;text-align:center;padding:9px 6px;border-radius:22px;font-size:13.5px;font-weight:600;color:var(--smoke);background:#fff;border:1px solid var(--mist);cursor:pointer;transition:.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .tab.on{color:#fff;background:var(--c);border-color:var(--c)}
  /* frequency card */
  .freq{margin:16px 20px 4px;background:#fff;border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:center;gap:14px;box-shadow:0 2px 16px color-mix(in srgb,var(--c) 14%,transparent);transition:box-shadow .3s}
  .orb{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--c2),var(--c));box-shadow:0 0 0 6px color-mix(in srgb,var(--c) 12%,transparent);transition:.3s}
  .hz{font-size:26px;font-weight:700;color:var(--c);letter-spacing:-.02em;transition:color .3s}
  .hz span{font-size:14px;font-weight:500;color:var(--fog);margin-left:2px}
  h1{font-family:var(--serif);text-align:center;font-size:27px;font-weight:500;margin:18px 24px 6px;letter-spacing:-.01em}
  .lede{text-align:center;color:var(--smoke);font-size:14px;line-height:1.5;margin:0 30px 14px}
  .queue{display:flex;align-items:center;justify-content:flex-end;gap:6px;color:var(--c);font-size:13px;font-weight:600;padding:2px 22px 8px;transition:color .3s}
  /* tracks */
  .track{display:flex;gap:13px;align-items:center;padding:11px 20px}
  .cov{position:relative;width:60px;height:60px;border-radius:13px;flex:0 0 auto;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),inset 0 -14px 22px rgba(0,0,0,.34),0 4px 12px rgba(0,0,0,.16)}
  .cov:after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 120%,transparent 40%,rgba(0,0,0,.30))}
  .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
  .play b{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.94);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.28)}
  .play b:after{content:'';border-left:9px solid var(--c);border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px;transition:border-left-color .3s}
  .meta{flex:1;min-width:0}
  .meta .t{font-family:var(--serif);font-size:16px;font-weight:500}
  .meta .d{color:var(--smoke);font-size:12.5px;line-height:1.4;margin-top:2px}
  .meta .tag{display:inline-flex;align-items:center;gap:5px;color:var(--c);font-size:12px;font-weight:600;margin-top:6px;transition:color .3s}
  .meta .tag i{width:7px;height:7px;border-radius:50%;background:var(--c);transition:background .3s}
  .rt{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex:0 0 auto}
  .icons{display:flex;gap:9px;color:var(--c);transition:color .3s}.icons svg{width:18px;height:18px}
  .dur{color:var(--fog);font-size:12px;font-weight:500;white-space:nowrap}
  .sep{height:1px;background:rgba(0,0,0,.05);margin:0 20px}
  /* bottom nav */
  .nav{position:absolute;left:0;right:0;bottom:0;height:74px;background:#fff;border-top:1px solid var(--mist);display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px}
  .nav a{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--fog);font-size:11px;font-weight:600;text-decoration:none}
  .nav a.on{color:var(--c);transition:color .3s}.nav svg{width:22px;height:22px}
  .ref{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#121314;color:#fff;font-size:11px;letter-spacing:.04em;padding:4px 12px;border-radius:20px;opacity:.85;z-index:9}
</style></head>
<body>
<div class="ref">REFERENCE · Immersions (tap a frequency)</div>
<div class="phone" id="phone">
  <div class="top"><div class="wm">zodiac<b>_fm</b></div><div class="burger"><i></i><i></i><i></i></div></div>
  <div class="tabs" id="tabs"></div>
  <div class="freq"><div class="orb"></div><div class="hz"><span id="hz">406</span><span> Hz</span></div></div>
  <h1 id="title">Core Vibrational Frequency</h1>
  <p class="lede" id="lede"></p>
  <div class="queue">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="15" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="11" y2="18"/><polygon points="17,9 17,21 23,15" fill="currentColor" stroke="none"/></svg>
    Queue All
  </div>
  <div id="list"></div>
  <nav class="nav">
    <a class="on" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Immersions</a>
    <a href="results.html"><svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M2 12h3l3-8 4 16 3-12 2 4h5"/></svg>Results</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l9 8.9 8.6-8.9a5.5 5.5 0 0 0 0-7.8z"/></svg>Favorites</a>
  </nav>
</div>
<script>
const NAMES = ['Quiet Success','Kindred Spirits','Elysian Surge','Starseed','Astrolith','Cosmic Drift','Galactic Slumber'];
const DUR   = ['3 min','5 min','5 min','9 min','9 min','25 min','1 hour'];
const DOMAINS = {
  core:{label:'Core', hz:'406', c:'#2832e0', c2:'#b402ff',
    lede:'These tracks create resonance with your true self at the Universal Field level. Experience the sound of you.',
    desc:['An immediate energetic wall reset, come back home now.','Allow your authentic self to deepen with the beat.','','Let your authentic self interact with deeper energetic levels.','Create resonance with your true self, develop authentic magnetism.','Access profound authentic energy through deep frequency work.','Find your true self as deep sleep restores your inner resonance.']},
  love:{label:'Love', hz:'414', c:'#ea1163', c2:'#fe4329',
    lede:'These tracks increase your authentic resonance in matters of love and relationships.',
    desc:['A quick tune-up to increase overall love resonance. A date night favorite!','Feel your sense of connection with others deepen with the beat.','Experience an intense connection within your relationships.','Dive into your role in your relationships, come from a deeper place.','Clarify your relationship field signal, creating authentic external magnetism.','Transform your relationship patterns at the deepest level.','Heal heart patterns during sleep as your love energy expands.']},
  vitality:{label:'Vitality', hz:'554', c:'#f96400', c2:'#f7d300',
    lede:'These tracks ignite your energy and restore, rejuvenate and recharge your life force.',
    desc:['An energetic pick-up that recharges your life force.','Experience your energy expand with the beat.','Reignite your inner fire as your vitality returns.','Restores your inner vitality while healing you from the inside.','Enhances your physical performance and external vitality, great for workouts.','Experience deep energetic renewal and profound physical restoration.','Restore life force during deep sleep and experience deep vitality.']},
  abundance:{label:'Abundance', hz:'596', c:'#2f9d63', c2:'#009dff',
    lede:'These tracks open your field to prosperity and a growth mindset. Overcome scarcity at the deepest level.',
    desc:['A short, powerful abundance un-lock. A procrastination killer.','Open yourself to opportunities and timing through the beat.','Turn obstacles into fuel and ride the wave forward.','Cultivate a mindset of plenty, clarify your worldly ambitions.','Your actions begin to align with your goals and opportunities multiply.','Transform your scarcity mindset with abundance at the deepest level.','Clear manifestation blocks during sleep as opportunities expand naturally.']},
};
// soundscape cover art: 7 layered, domain-tinted nebula compositions (one per track)
const PRESETS = [
  {a:'28% 22%',b:'72% 70%',c:'88% 18%',ang:'135deg'},
  {a:'72% 26%',b:'24% 74%',c:'14% 22%',ang:'205deg'},
  {a:'50% 16%',b:'52% 86%',c:'86% 78%',ang:'160deg'},
  {a:'20% 72%',b:'80% 28%',c:'32% 26%',ang:'118deg'},
  {a:'82% 64%',b:'28% 24%',c:'72% 82%',ang:'222deg'},
  {a:'34% 36%',b:'70% 74%',c:'18% 82%',ang:'150deg'},
  {a:'62% 18%',b:'38% 82%',c:'82% 42%',ang:'184deg'},
];
const cover = i => { const p=PRESETS[i%7]; return `background:
  radial-gradient(circle at ${p.a}, color-mix(in srgb,var(--c2) 88%,#fff) 0%, transparent 42%),
  radial-gradient(circle at ${p.b}, var(--c) 0%, transparent 58%),
  radial-gradient(circle at ${p.c}, rgba(0,0,0,.9) 0%, transparent 60%),
  linear-gradient(${p.ang}, #15121f, color-mix(in srgb,var(--c) 38%,#15121f));`; };

const heart='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l9 8.9 8.6-8.9a5.5 5.5 0 0 0 0-7.8z"/></svg>';
const cloud='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10a6 6 0 0 0-11.3-2A4.5 4.5 0 0 0 7 19h11a4 4 0 0 0 0-9z"/><path d="M12 12v5m0 0 2-2m-2 2-2-2"/></svg>';

const tabsEl=document.getElementById('tabs');
tabsEl.innerHTML=Object.keys(DOMAINS).map(k=>`<div class="tab" data-k="${k}">${DOMAINS[k].label}</div>`).join('');

function setDomain(k){
  const d=DOMAINS[k];
  const ph=document.getElementById('phone');
  ph.style.setProperty('--c',d.c); ph.style.setProperty('--c2',d.c2);
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.k===k));
  document.getElementById('hz').textContent=d.hz;
  document.getElementById('title').textContent=d.label+' Vibrational Frequency';
  document.getElementById('lede').textContent=d.lede;
  document.getElementById('list').innerHTML=NAMES.map((n,i)=>`
    <div class="track">
      <div class="cov" style="${cover(i)}"><div class="play"><b></b></div></div>
      <div class="meta">
        <div class="t">${n}</div>
        ${d.desc[i]?`<div class="d">${d.desc[i]}</div>`:''}
        <div class="tag"><i></i> ${d.label}</div>
      </div>
      <div class="rt"><div class="icons">${cloud}${heart}</div>${d.desc[i]?`<div class="dur">${DUR[i]}</div>`:''}</div>
    </div>${i<NAMES.length-1?'<div class="sep"></div>':''}`).join('');
}
tabsEl.addEventListener('click',e=>{const t=e.target.closest('.tab');if(t){setDomain(t.dataset.k);history.replaceState(null,'','#'+t.dataset.k);}});
const start=location.hash.slice(1);
setDomain(DOMAINS[start]?start:'core');
</script>
</body></html>
