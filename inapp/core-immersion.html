<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Core Immersion — Zodiac.fm (reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --core:#2832e0; --core2:#b402ff; --love:#ea1163; --vit:#f96400; --abun:#70b974;
    --paper:#fbf8f3; --ink:#121314; --smoke:#555; --fog:#888; --mist:#e7e1d8; --card:#fff;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#ede7df;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:24px 0;min-height:100vh}
  .phone{width:402px;max-width:100%;background:var(--paper);min-height:850px;position:relative;padding-bottom:96px;box-shadow:0 24px 60px rgba(0,0,0,.18);border-radius:28px;overflow:hidden}
  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 6px}
  .wm{font-family:var(--serif);font-size:21px;font-weight:500;letter-spacing:-.01em}
  .wm b{font-weight:600}
  .burger{display:flex;flex-direction:column;gap:4px}
  .burger i{width:22px;height:2px;background:var(--ink);border-radius:2px}
  /* domain tabs */
  .tabs{display:flex;gap:8px;padding:12px 20px 4px;overflow-x:auto}
  .tab{flex:0 0 auto;padding:9px 20px;border-radius:22px;font-size:14px;font-weight:600;color:var(--smoke);background:#fff;border:1px solid var(--mist)}
  .tab.on{color:#fff;background:var(--core);border-color:var(--core)}
  /* frequency card */
  .freq{margin:16px 20px 4px;background:#fff;border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:center;gap:14px;box-shadow:0 2px 10px rgba(40,50,224,.06)}
  .orb{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--core2),var(--core));box-shadow:0 0 0 6px rgba(40,50,224,.10)}
  .hz{font-size:26px;font-weight:700;color:var(--core);letter-spacing:-.02em}
  .hz span{font-size:14px;font-weight:500;color:var(--fog);margin-left:2px}
  h1{font-family:var(--serif);text-align:center;font-size:27px;font-weight:500;margin:18px 24px 6px;letter-spacing:-.01em}
  .lede{text-align:center;color:var(--smoke);font-size:14px;line-height:1.5;margin:0 30px 14px}
  .queue{display:flex;align-items:center;justify-content:flex-end;gap:6px;color:var(--core);font-size:13px;font-weight:600;padding:2px 22px 8px}
  /* tracks */
  .track{display:flex;gap:13px;align-items:center;padding:11px 20px}
  .cov{position:relative;width:58px;height:58px;border-radius:12px;flex:0 0 auto;overflow:hidden;background:linear-gradient(135deg,var(--core),var(--core2))}
  .cov.g1{background:linear-gradient(135deg,#3a2f6e,#7b4bd6)}
  .cov.g2{background:linear-gradient(135deg,#d8d2cc,#b9b2ab)}
  .cov.g3{background:linear-gradient(135deg,#2a1c4a,#5b3aa8)}
  .cov.g4{background:linear-gradient(135deg,#6b3f2a,#caa07a)}
  .cov.g5{background:linear-gradient(135deg,#23306b,#3f63c2)}
  .cov.g6{background:linear-gradient(135deg,#1d2747,#2f57a8)}
  .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .play b{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center}
  .play b:after{content:'';border-left:9px solid var(--core);border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px}
  .meta{flex:1;min-width:0}
  .meta .t{font-family:var(--serif);font-size:16px;font-weight:500}
  .meta .d{color:var(--smoke);font-size:12.5px;line-height:1.4;margin-top:2px}
  .meta .tag{display:inline-flex;align-items:center;gap:5px;color:var(--core);font-size:12px;font-weight:600;margin-top:6px}
  .meta .tag i{width:7px;height:7px;border-radius:50%;background:var(--core)}
  .rt{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex:0 0 auto}
  .icons{display:flex;gap:9px;color:var(--core)}
  .icons svg{width:18px;height:18px}
  .dur{color:var(--fog);font-size:12px;font-weight:500;white-space:nowrap}
  .sep{height:1px;background:rgba(0,0,0,.05);margin:0 20px}
  /* bottom nav */
  .nav{position:absolute;left:0;right:0;bottom:0;height:74px;background:#fff;border-top:1px solid var(--mist);display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px}
  .nav a{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--fog);font-size:11px;font-weight:600;text-decoration:none}
  .nav a.on{color:var(--core)}
  .nav svg{width:22px;height:22px}
  .ref{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#121314;color:#fff;font-size:11px;letter-spacing:.04em;padding:4px 12px;border-radius:20px;font-family:var(--sans);opacity:.85}
</style></head>
<body>
<div class="ref">REFERENCE · Core Immersion (Immersions tab)</div>
<div class="phone">
  <div class="top">
    <div class="wm">zodiac<b>_fm</b></div>
    <div class="burger"><i></i><i></i><i></i></div>
  </div>
  <div class="tabs">
    <div class="tab on">Core</div>
    <div class="tab">Love</div>
    <div class="tab">Vitality</div>
    <div class="tab">Abundance</div>
  </div>
  <div class="freq"><div class="orb"></div><div class="hz">406<span>Hz</span></div></div>
  <h1>Core Vibrational Frequency</h1>
  <p class="lede">These tracks create resonance with your true self at the Universal Field level. Experience the sound of you.</p>
  <div class="queue">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="15" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="11" y2="18"/><polygon points="17,9 17,21 23,15" fill="currentColor" stroke="none"/></svg>
    Queue All
  </div>
  <div id="list"></div>
  <nav class="nav">
    <a class="on" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Immersions</a>
    <a href="results.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h3l3-8 4 16 3-12 2 4h5"/></svg>Results</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>Favorites</a>
  </nav>
</div>
<script>
  const heart='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l9 8.9 8.6-8.9a5.5 5.5 0 0 0 0-7.8z"/></svg>';
  const cloud='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10a6 6 0 0 0-11.3-2A4.5 4.5 0 0 0 7 19h11a4 4 0 0 0 0-9z"/><path d="M12 12v5m0 0 2-2m-2 2-2-2"/></svg>';
  const tracks=[
    {c:'g1',t:'Quiet Success',d:'An immediate energetic wall reset, come back home now.',m:'3 min'},
    {c:'g2',t:'Kindred Spirits',d:'Allow your authentic self to deepen with the beat.',m:'5 min'},
    {c:'g2',t:'Elysian Surge',d:'',m:''},
    {c:'g3',t:'Starseed',d:'Let your authentic self interact with deeper energetic levels.',m:'9 min'},
    {c:'g4',t:'Astrolith',d:'Create resonance with your true self, develop authentic magnetism.',m:'9 min'},
    {c:'g5',t:'Cosmic Drift',d:'Access profound authentic energy through deep frequency work.',m:'25 min'},
    {c:'g6',t:'Galactic Slumber',d:'Find your true self as deep sleep restores your inner resonance.',m:'1 hour'},
  ];
  document.getElementById('list').innerHTML = tracks.map((x,i)=>`
    <div class="track">
      <div class="cov ${x.c}"><div class="play"><b></b></div></div>
      <div class="meta">
        <div class="t">${x.t}</div>
        ${x.d?`<div class="d">${x.d}</div>`:''}
        <div class="tag"><i></i> Core</div>
      </div>
      <div class="rt"><div class="icons">${cloud}${heart}</div>${x.m?`<div class="dur">${x.m}</div>`:''}</div>
    </div>${i<tracks.length-1?'<div class="sep"></div>':''}`).join('');
</script>
</body></html>
