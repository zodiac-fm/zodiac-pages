<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Zodiac · Your Year (progress bar, two ways)</title>
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap" rel="stylesheet">
<style>
  /* Colours from design/tokens.json (locked). Cream canvas + white card, Core Purple structure.
     Type: Switzer for EVERYTHING incl. ALL numbers (lining figures). No serif on this data screen (locked rule: numbers never in the serif). */
  :root{
    --cream:#F6F1E8; --card:#FFFFFF; --ink:#1A1620; --ink2:#2A2530; --mut:#7a7480; --soft:#a8a2ad;
    --line:#efe6d6; --mist:#EEE9E0;
    --violet:#6521C9; --violet-deep:#38007A; --violet-tint:#EFECFF; --violet-soft:#D2C8FF;
    --ab:#0A7A52;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%;background:#e7e2d8;font-family:'Switzer',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink)}
  body{display:flex;flex-direction:column;align-items:center;padding:16px 0 30px}
  .num{font-variant-numeric:lining-nums}

  /* controls (outside the phone) */
  .controls{display:flex;flex-direction:column;gap:8px;align-items:center;margin-bottom:14px}
  .grp{display:flex;gap:6px}
  .grp button{font-family:'Switzer',sans-serif;font-size:13px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid #d8d2c6;padding:9px 16px;border-radius:22px;cursor:pointer;-webkit-appearance:none}
  .grp button.on{background:var(--violet);color:#fff;border-color:var(--violet)}
  .explain{max-width:min(420px,92vw);text-align:center;font-size:12.5px;line-height:1.5;color:var(--ink2);padding:0 10px}

  #app{position:relative;width:min(420px,100vw);height:min(760px,84dvh);overflow:hidden;background:var(--cream);display:flex;flex-direction:column}
  @media (min-width:440px){ #app{border-radius:30px;box-shadow:0 30px 80px rgba(0,0,0,.22);border:1px solid rgba(0,0,0,.05)} }
  @media (max-width:439px){ body{padding:8px 0 0} #app{width:100vw;height:100dvh} }

  .glow{position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:480px;height:380px;z-index:0;pointer-events:none;
    background:radial-gradient(closest-side,rgba(101,33,201,.07),rgba(101,33,201,.02) 55%,rgba(101,33,201,0) 75%)}
  .top{position:relative;z-index:1;padding:16px 20px 4px;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto}
  .logo img{height:19px;width:auto;display:block}
  .ham{font-size:20px;color:#333}
  .util{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:10px 22px 0;flex:0 0 auto}
  .util .wk{font-size:13px;font-weight:700;color:var(--violet)}
  .util .wk span{font-weight:500;color:var(--mut)}

  .scroll{position:relative;z-index:1;flex:1;overflow-y:auto}
  .card{margin:14px 18px 0;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 18px 22px;box-shadow:0 6px 20px rgba(26,22,32,.05)}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
  .htitle{font-size:23px;font-weight:700;line-height:1.12;letter-spacing:-.015em;color:var(--ink);margin-top:8px;font-variant-numeric:lining-nums}

  .yr{position:relative;margin-top:28px;height:12px}
  .yrtrack{position:absolute;left:0;right:0;top:0;height:12px;border-radius:7px;background:var(--mist);overflow:hidden}
  .yrfill{position:absolute;left:0;top:0;bottom:0;border-radius:7px;background:linear-gradient(90deg,var(--violet),var(--violet-deep));transition:width .5s cubic-bezier(.4,0,.2,1)}
  .yrghost{position:absolute;top:-3px;bottom:-3px;width:0;border-right:2px dotted #b6adc9}
  .mstick{position:absolute;top:-6px;width:2px;height:24px;background:#d8d0c2;border-radius:2px}
  .mstick.hit{background:var(--violet-soft)}
  .mslab{position:absolute;top:26px;transform:translateX(-50%);font-size:9.5px;font-weight:600;letter-spacing:.02em;color:var(--soft);white-space:nowrap;text-align:center;line-height:1.15;font-variant-numeric:lining-nums}
  .mslab b{display:block;color:var(--mut);font-weight:700}
  .youpin{position:absolute;top:-9px;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;transition:left .5s cubic-bezier(.4,0,.2,1)}
  .youpin .dot{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--violet);box-shadow:0 2px 6px rgba(56,0,122,.28)}
  .youpin .lab{margin-top:5px;font-size:10px;font-weight:700;color:var(--violet-deep)}
  .ghostlab{position:absolute;top:44px;transform:translateX(-50%);font-size:9.5px;font-weight:600;color:var(--soft);white-space:nowrap}

  .banked{display:flex;align-items:center;gap:12px;margin-top:64px;padding-top:16px;border-top:1px solid var(--line)}
  .banked .bignum{font-size:30px;font-weight:700;color:var(--violet-deep);letter-spacing:-.01em;line-height:1;font-variant-numeric:lining-nums}
  .banked .bl{display:flex;flex-direction:column;gap:2px}
  .banked .bl .k{font-size:13px;font-weight:600;color:var(--ink)}
  .banked .bl .v{font-size:11.5px;color:var(--mut)}
  .banked .tick{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--ab);white-space:nowrap}
  .spacer-b{margin-top:64px}

  .pace{margin-top:18px;padding:14px 15px;border-radius:14px;background:var(--violet-tint);border:1px solid #e6ddfa}
  .pace .pl{font-size:13.5px;line-height:1.5;color:var(--ink2)}
  .pace.build{background:#f5f2ea;border-color:#e8e0d0}

  #nav{position:relative;z-index:1;flex:0 0 auto;height:58px;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;align-items:center}
  #nav div{font-size:11px;text-align:center;color:#9a95a0}
  #nav div.on{color:#1A1620;font-weight:700}
  #nav svg{width:17px;height:17px;display:block;margin:0 auto 2px}
</style></head><body>

  <div class="controls">
    <div class="grp">
      <button id="opt-a" class="on" onclick="setOpt('a')">Option A · simple bar</button>
      <button id="opt-b" onclick="setOpt('b')">Option B · dose bar</button>
    </div>
    <div class="grp">
      <button id="sc-good" class="on" onclick="setScn('good')">Strong run</button>
      <button id="sc-paused" onclick="setScn('paused')">After a 5-week pause</button>
    </div>
    <div class="explain" id="explain"></div>
  </div>

  <div id="app">
    <div class="glow"></div>
    <div class="top">
      <div class="logo"><img src="app-assets/logo-black.svg" alt="zodiac.fm"></div>
      <div class="ham">&#9776;</div>
    </div>
    <div class="util"><div class="wk num">Week 15 <span>&middot; resets Monday</span></div></div>
    <div class="scroll">
      <div class="card">
        <div class="eyebrow">Your year</div>
        <div class="htitle" id="htitle"></div>
        <div class="yr" id="yr"></div>
        <div id="belowtrack"></div>
        <div class="pace" id="pace"><div class="pl" id="pace-line"></div></div>
      </div>
    </div>
    <div id="nav">
      <div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 18V5l11-2v13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3"/><circle cx="20" cy="16" r="3"/></svg>Immersions</div>
      <div class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14v4M9 9v9M14 5v13M19 11v7" stroke-linecap="round"/></svg>Progress</div>
      <div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z" stroke-linecap="round" stroke-linejoin="round"/></svg>Playlist</div>
    </div>
  </div>

<script>
  var MS=[{w:4,l:'Pop'},{w:13,l:'Turning point'},{w:26,l:'Half year'},{w:52,l:'Solar Return'}];
  var PACE_ON="Your dose sits right where the study's was, so the windows ahead are simply yours to walk into. More balanced time tends to bring them a little sooner.";
  var PACE_BUILD="Your windows are the roomy kind; they wait for you. Every balanced hour you bank pulls the next one a little closer. Nothing here is behind you; it is all still ahead.";
  var EX_A="Option A: the year bar is the calendar. Your balanced weeks are a separate number that only grows, so a slow week never looks like a setback.";
  var EX_B="Option B: the year bar advances only on balanced weeks. A pause visibly holds your position back; more balanced listening visibly moves you forward.";

  var opt='a', scn='good';
  function pct(w){ return (w/52*100); }
  function trackHTML(fillW, youW, ghostW){
    var h='<div class="yrtrack"><div class="yrfill" style="width:'+pct(fillW)+'%"></div></div>';
    MS.forEach(function(m){
      var hit=youW>=m.w;
      h+='<div class="mstick'+(hit?' hit':'')+'" style="left:calc('+pct(m.w)+'% - 1px)"></div>';
      h+='<div class="mslab" style="left:'+pct(m.w)+'%"><b>Wk '+m.w+'</b>'+m.l+'</div>';
    });
    if(ghostW!=null){
      h+='<div class="yrghost" style="left:'+pct(ghostW)+'%"></div>';
      h+='<div class="ghostlab" style="left:'+pct(ghostW)+'%">calendar week 15</div>';
    }
    h+='<div class="youpin" style="left:'+pct(youW)+'%"><div class="dot"></div><div class="lab">You</div></div>';
    return h;
  }
  function render(){
    var paused=(scn==='paused'), balanced=paused?8:14, cal=15;
    document.getElementById('explain').textContent = (opt==='a')?EX_A:EX_B;
    var below;
    if(opt==='a'){
      document.getElementById('htitle').textContent='Week 15 of 52';
      document.getElementById('yr').innerHTML=trackHTML(cal,cal,null);
      below='<div class="banked"><div class="bignum">'+balanced+'</div>'
        +'<div class="bl"><div class="k">balanced weeks banked</div><div class="v">'
        +(paused?'a few quiet weeks in there, and it keeps growing':'nearly every week, all four in the mix')
        +'</div></div><div class="tick">&#9650; and counting</div></div>';
    } else {
      document.getElementById('htitle').textContent='Your progress: '+balanced+' balanced weeks';
      document.getElementById('yr').innerHTML=trackHTML(balanced,balanced,paused?cal:null);
      below='<div class="spacer-b"></div>';
    }
    document.getElementById('belowtrack').innerHTML=below;
    document.getElementById('pace-line').textContent=paused?PACE_BUILD:PACE_ON;
    document.getElementById('pace').className='pace'+(paused?' build':'');
  }
  function setOpt(o){ opt=o; document.getElementById('opt-a').classList.toggle('on',o==='a'); document.getElementById('opt-b').classList.toggle('on',o==='b'); render(); }
  function setScn(s){ scn=s; document.getElementById('sc-good').classList.toggle('on',s==='good'); document.getElementById('sc-paused').classList.toggle('on',s==='paused'); render(); }
  render();
</script>
</body></html>
