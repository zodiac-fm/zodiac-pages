  let lg=x.createLinearGradient(tx(tBack),0,px,0);
  lg.addColorStop(0,'rgba(245,238,224,0.05)'); lg.addColorStop(1,'rgba(245,238,224,'+(0.40+e6*0.22)+')');
  x.strokeStyle=lg; x.lineWidth=(0.9+0.5*fl)*DPR; x.lineCap='round';
  x.beginPath(); x.moveTo(tx(tBack),ty); x.lineTo(px,ty); x.stroke();
  // each beat = a soft glint on the line, drifting back into the past
  const nb2=D.beat.length, bper=D.dur/(nb2-1);
  const j0=Math.max(0,Math.floor(tBack/bper)), j1=Math.min(nb2-1,Math.floor(tt/bper));
  for(let j=j0;j<=j1;j++){ const bv=D.beat[j]; if(bv<0.55) continue;
    const bts=j*bper, gx=tx(bts), age=Math.min(1,(tt-bts)/hw);
    const gv=((bv-0.55)/0.85)*Math.pow(1-age,1.5); if(gv<=0.02) continue;
    const r=(2.5+5*gv)*DPR; const gg=x.createRadialGradient(gx,ty,0,gx,ty,r);
    gg.addColorStop(0,'rgba(255,130,210,'+(0.45*gv)+')'); gg.addColorStop(1,'rgba(255,130,210,0)');
    x.fillStyle=gg; x.beginPath(); x.arc(gx,ty,r,0,7); x.fill(); }

  // ---- NOW = PLAYING NOW, in pink: the live bar + a clean circle lead ----
  const aN=env*halfMax*0.97;
  let pn=x.createLinearGradient(0,midY-aN,0,midY+aN);
  pn.addColorStop(0,'rgba(255,120,205,'+(0.55+0.4*fl)+')'); pn.addColorStop(0.5,'rgba(255,120,205,'+(0.22+0.3*fl)+')'); pn.addColorStop(1,'rgba(255,120,205,'+(0.55+0.4*fl)+')');
  x.strokeStyle=pn; x.lineWidth=1.6*DPR; x.lineCap='round';
  x.beginPath(); x.moveTo(px,midY-aN); x.lineTo(px,midY+aN); x.stroke();
  const cr=(4.5+e6*2.5)*DPR + fl*3*DPR;
  let cg=x.createRadialGradient(px,ty,0,px,ty,cr*2.4);
  cg.addColorStop(0,'rgba(255,130,210,'+(0.30+0.35*fl)+')'); cg.addColorStop(1,'rgba(255,130,210,0)');
  x.fillStyle=cg; x.beginPath(); x.arc(px,ty,cr*2.4,0,7); x.fill();
  x.strokeStyle='rgba(255,214,240,'+(0.7+0.3*fl)+')'; x.lineWidth=1*DPR; x.beginPath(); x.arc(px,ty,cr,0,7); x.stroke();
  x.fillStyle='rgba(255,236,248,0.95)'; x.beginPath(); x.arc(px,ty,1.2*DPR,0,7); x.fill();

  // ---- labels ----
  x.font=(9*DPR)+'px Georgia, serif'; x.textBaseline='alphabetic'; x.textAlign='center';
  const ly=midY+halfMax+16*DPR;
  x.fillStyle='rgba(236,228,214,0.22)'; x.fillText('P A S T', x0+span*0.20, ly);
  x.fillStyle='rgba(236,228,214,0.22)'; x.fillText('C O M I N G   U P', x0+span*0.80, ly);
  x.fillStyle='rgba(255,150,215,0.55)'; x.fillText('N O W', px, ly);
  x.fillStyle='rgba(245,238,224,0.4)'; x.textBaseline='middle'; x.textAlign='left';
  x.font=(11*DPR)+'px Georgia, serif';
  x.save(); x.globalAlpha=.8; x.fillText('600 H Z', x0, midY-halfMax-12*DPR); x.restore();



  // ---- motes ----
  for(const m of motes){ const mx=((m.x+ (T*0.01*m.s))%1)*W, my=(m.y*0.8+0.1)*H + Math.sin(T*0.14+m.ph)*6*DPR;
    x.fillStyle='rgba(183,162,232,'+(0.05+0.05*Math.sin(T*0.30+m.ph))+')'; x.beginPath(); x.arc(mx,my,m.s*1.6*DPR,0,7); x.fill(); }

  // ---- grain + vignette ----
  if(grain){x.save();x.globalAlpha=0.5;const p2=x.createPattern(grain,'repeat');x.fillStyle=p2;x.translate((T*1.4)%160,(T*1.0)%160);x.fillRect(-160,-160,W+320,H+320);x.restore();}
  let vg=x.createRadialGradient(cx,H*0.5,H*0.2,cx,H*0.5,H*0.8);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
  x.fillStyle=vg; x.fillRect(0,0,W,H);

  // timecode
  const f=s=>{s=isFinite(s)?s:0;return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');};
  tc.textContent=f(tt)+'  /  '+f(D.dur);
}
frame();
</script></body></html>
