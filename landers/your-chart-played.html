<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zodiac.fm — Interactive VSL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--violet:#6B2BE8;--violet-deep:#3B22D9;--paper:#FBF8F3;--ink:#191320;--muted:#8a8275}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 50% -8%, #FCFAF6 0%, #F1EBE0 52%, #E4DBCD 100%);
    user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}

  .seq{position:relative;height:100dvh;width:100%;display:flex;flex-direction:column;align-items:center;padding:16px 22px 0}

  .bars{display:flex;gap:6px;width:100%;max-width:330px;margin-bottom:12px;z-index:6}
  .bars span{flex:1;height:3px;border-radius:3px;background:rgba(20,16,25,.13);overflow:hidden}
  .bars span i{display:block;height:100%;width:0;background:var(--violet);border-radius:3px}

  /* phone holds everything */
  .phone-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%;cursor:pointer}
  .phone{position:relative;width:266px;height:546px;
    background:linear-gradient(155deg,#26262b,#070708);border-radius:48px;padding:10px;
    box-shadow:0 2px 4px rgba(60,40,20,.25),0 32px 60px rgba(60,42,24,.30)}
  .phone::after{content:"";position:absolute;right:-2px;top:134px;width:3px;height:52px;border-radius:3px;background:linear-gradient(#34343a,#0c0c0d)}
  .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:84px;height:26px;background:#000;border-radius:14px;z-index:9}
  .screen{position:relative;width:100%;height:100%;background:var(--paper);border-radius:38px;overflow:hidden;color:var(--ink)}

  .view{position:absolute;inset:0;display:flex;flex-direction:column;padding:42px 24px 24px;opacity:0;animation:vin .42s cubic-bezier(.22,.61,.36,1) forwards}
  @keyframes vin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.4px;color:#100d18;z-index:3}
  .brand span{font-weight:400}
  .orb{position:absolute;left:50%;top:55%;width:230px;height:230px;border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 45% 42%, rgba(123,72,255,.4), rgba(123,72,255,0) 62%);filter:blur(4px);z-index:0;animation:orb 7s ease-in-out infinite}
  @keyframes orb{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-52%) scale(1.08)}}
  .center{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-bottom:56px}

  .line{font-family:'Fraunces',serif;font-weight:400;line-height:1.16;letter-spacing:-.01em;font-size:24px;color:#1c1622;min-height:1.1em}
  .line .it{font-style:italic;color:#3a3340}
  .cw{display:inline-block;width:2px;height:.92em;background:var(--violet);margin-left:3px;transform:translateY(2px);animation:blink .9s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  .v-sub{font-size:12.5px;line-height:1.5;color:#6a6573;max-width:225px;margin-top:14px;opacity:0;animation:rise .5s ease .15s forwards}
  .eyebrow{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--violet);margin-bottom:14px;opacity:0;animation:rise .5s ease forwards}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* reveal */
  .topbar{display:flex;align-items:center;justify-content:space-between}
  .burger{display:flex;flex-direction:column;gap:4px}
  .burger i{display:block;width:18px;height:2px;background:#1a1622;border-radius:2px}
  .r-title{font-family:'Fraunces',serif;font-weight:400;font-size:26px;line-height:1.08;color:#1c1622;margin:24px 0 5px}
  .r-title .it{font-style:italic;color:#3a3340}
  .r-sub{font-size:10.5px;line-height:1.5;color:#8a8597;margin-bottom:16px}
  .glow{position:absolute;left:-24px;top:286px;width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(123,72,255,.5), rgba(123,72,255,0) 62%);filter:blur(6px);z-index:0}
  .freq{position:relative;z-index:2}
  .freq-row{display:flex;align-items:baseline;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(20,16,25,.10);opacity:0;animation:rise .5s ease forwards}
  .freq-row:nth-child(1){animation-delay:.05s}.freq-row:nth-child(2){animation-delay:.13s}.freq-row:nth-child(3){animation-delay:.21s}.freq-row:nth-child(4){animation-delay:.29s}
  .freq-row:first-child{border-top:1px solid rgba(20,16,25,.10)}
  .freq-name{font-size:10.5px;font-weight:500;color:#3a3543}
  .freq-val{font-weight:800;font-size:23px;letter-spacing:-.5px;color:#120e1a;white-space:nowrap}
  .freq-val small{font-size:10px;font-weight:600;color:#6a6573;margin-left:2px}

  /* proof */
  .qmark{font-family:'Fraunces',serif;font-size:54px;line-height:.5;color:rgba(107,43,232,.35);margin-bottom:10px;height:30px}

  /* offer */
  .o-price{margin-bottom:4px;opacity:0;animation:rise .5s ease forwards}
  .o-price s{color:#a8a2b0;font-size:14px;font-weight:600;margin-right:8px}
  .o-price b{color:#120e1a;font-size:28px;font-weight:800;letter-spacing:-.5px}
  .o-price span{color:#6a6573;font-size:13px;font-weight:600}
  .screen-cta{margin-top:20px;background:linear-gradient(150deg,var(--violet),var(--violet-deep));color:#fff;font-weight:700;
    font-size:14px;border:none;border-radius:40px;padding:14px 28px;box-shadow:0 12px 24px rgba(107,43,232,.45);cursor:pointer;
    opacity:0;animation:rise .5s ease .2s forwards, pulse 2.2s ease-in-out 1.2s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}

  /* on-screen "next" affordance — lives ON the phone, where the eye already is */
  .next-cue{position:absolute;left:50%;bottom:22px;z-index:8;display:flex;align-items:center;gap:9px;cursor:pointer;
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:14.5px;color:#fff;white-space:nowrap;
    background:linear-gradient(150deg,var(--violet),var(--violet-deep));padding:13px 22px;border-radius:30px;border:none;
    transform:translateX(-50%);animation:cuepop .45s ease .3s both, pillpulse 1.9s ease-in-out 1s infinite}
  .next-cue .arr{font-style:normal;color:#fff;font-size:18px;line-height:1;animation:nudge 1.05s ease-in-out infinite}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
  @keyframes cuepop{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes pillpulse{0%,100%{box-shadow:0 8px 20px rgba(107,43,232,.42);transform:translateX(-50%) scale(1)}50%{box-shadow:0 12px 30px rgba(107,43,232,.62);transform:translateX(-50%) scale(1.045)}}

  .footer{flex:none;width:100%;display:flex;align-items:center;justify-content:center;padding:12px 0 14px;z-index:7}
  .controls{display:flex;align-items:center;gap:13px}
  .ctrl{width:44px;height:44px;border-radius:50%;border:1px solid rgba(20,16,25,.12);background:rgba(255,255,255,.72);
    color:#2c2530;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s}
  .ctrl svg{width:17px;height:17px;fill:currentColor}
  .ctrl:hover{background:#fff;transform:translateY(-1px)}
  .ctrl.play{width:56px;height:56px;background:linear-gradient(150deg,var(--violet),var(--violet-deep));color:#fff;border:none;box-shadow:0 10px 22px rgba(107,43,232,.4)}
  .ctrl.play svg{width:20px;height:20px}
  .ctrl.ghost{width:40px;height:40px;color:var(--muted)}
</style>
</head>
<body>
  <div class="seq" id="seq">
    <div class="bars" id="bars"></div>

    <div class="phone-wrap" id="stage">
      <div class="phone"><div class="island"></div><div class="screen" id="screen"></div></div>
    </div>

    <div class="footer">
      <div class="controls">
        <button class="ctrl" id="prev" title="back"><svg viewBox="0 0 24 24"><path d="M15 5l-8 7 8 7z"/></svg></button>
        <button class="ctrl play" id="play" title="play / pause"></button>
        <button class="ctrl" id="next" title="next"><svg viewBox="0 0 24 24"><path d="M9 5l8 7-8 7z"/></svg></button>
        <button class="ctrl ghost" id="restart" title="restart"><svg viewBox="0 0 24 24"><path d="M12 5V2L7 6l5 4V7a5 5 0 11-5 5H5a7 7 0 107-7z"/></svg></button>
      </div>
    </div>
  </div>

<script>
(function(){
  var ICON_PLAY='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  var ICON_PAUSE='<svg viewBox="0 0 24 24"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>';
  var brand='<div class="brand">zodiac<span>.fm</span></div>';
  var freqRows=
    '<div class="freq-row"><span class="freq-name">Core Frequency&trade;</span><span class="freq-val"><span class="num" data-t="444.3" data-d="1">0.0</span><small>hz</small></span></div>'+
    '<div class="freq-row"><span class="freq-name">Love Frequency&trade;</span><span class="freq-val"><span class="num" data-t="470.5" data-d="1">0.0</span><small>hz</small></span></div>'+
    '<div class="freq-row"><span class="freq-name">Vitality Frequency&trade;</span><span class="freq-val"><span class="num" data-t="629" data-d="0">0</span><small>hz</small></span></div>'+
    '<div class="freq-row"><span class="freq-name">Abundance Frequency&trade;</span><span class="freq-val"><span class="num" data-t="623" data-d="0">0</span><small>hz</small></span></div>';

  var S=[
    {type:'msg', a:'You did the work. Built the life.\n', it:'And still, something says: this isn’t it.', cue:'What is that?', dur:4800},
    {type:'msg', a:'It’s the space between the self you built\n', it:'and the one you were born as.', cue:'There are two of me?', dur:4800},
    {type:'msg', a:'Every practice improved the first one.\n', it:'None gave you the second.', cue:'So how do I reach it?', dur:4600},
    {type:'msg', a:'Your chart isn’t only information.\n', it:'It’s a sound.', cue:'A sound?', dur:4000},
    {type:'msg', a:'Play it back, and your body finds its note\n', it:'like a tuning fork. The noise drops away.', cue:'So what’s mine?', dur:5000},
    {type:'reveal', cue:'And then what?', dur:5600},
    {type:'msg', a:'Resonate as yourself.\n', it:'The right people arrive. The wrong ones leave.', cue:'Does that really happen?', dur:5200},
    {type:'proof', a:'“oh there you are, Hilary.\n', it:'I found you.”', sub:'Hilary Wilson, listener', cue:'Could that be me?', dur:4800},
    {type:'offer', dur:0}
  ];

  var idx=0, last=S.length-1, playing=false, typeSeq=0, raf=null, sceneStart=0, curFrac=0;
  var screen=document.getElementById('screen');
  var playBtn=document.getElementById('play');
  function cuePill(q){return '<div class="next-cue">'+q+'<span class="arr">&rsaquo;</span></div>';}

  // progress bars
  var bars=[];
  (function(){var b=document.getElementById('bars');for(var i=0;i<S.length;i++){var sp=document.createElement('span');sp.innerHTML='<i></i>';b.appendChild(sp);bars.push(sp.firstChild);}})();
  function setBars(frac){bars.forEach(function(el,i){el.style.transition=(i===idx&&playing)?'none':'width .35s ease';el.style.width=(i<idx?100:(i===idx?frac*100:0))+'%';});}

  function ease(p){p=Math.max(0,Math.min(1,p));return 1-Math.pow(1-p,3);}
  function fmt(v,d){return d>0?v.toFixed(d):Math.round(v).toString();}
  function countUp(){var nums=[].slice.call(screen.querySelectorAll('.num')),t0=null,dur=1300,my=typeSeq;
    function step(ts){if(my!==typeSeq)return;if(t0===null)t0=ts;var p=(ts-t0)/dur;
      nums.forEach(function(el){el.textContent=fmt(parseFloat(el.getAttribute('data-t'))*ease(p),parseInt(el.getAttribute('data-d'),10));});
      if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);}

  function typeLine(el,a,it,my){
    var i=0,total=a.length+(it?it.length:0),cps=33;
    function frag(s){return s.replace(/\n/g,'<br>');}
    function tick(){
      if(my!==typeSeq)return;
      i++;
      var ai=Math.min(a.length,i), ii=Math.max(0,i-a.length);
      el.innerHTML=frag(a.slice(0,ai))+(it?'<span class="it">'+frag(it.slice(0,ii))+'</span>':'')+'<span class="cw"></span>';
      if(i<total){setTimeout(tick,1000/cps);}
      else{var c=el.querySelector('.cw');if(c)setTimeout(function(){if(my===typeSeq&&c)c.style.display='none';},700);}
    }
    el.innerHTML='<span class="cw"></span>'; tick();
  }

  function render(){
    var s=S[idx]; typeSeq++; var my=typeSeq;
    if(s.type==='msg'||s.type==='proof'){
      screen.innerHTML='<div class="view">'+brand+'<div class="orb"></div><div class="center">'+
        (s.type==='proof'?'<div class="qmark">&rdquo;</div>':'')+
        '<div class="line" id="L"></div>'+(s.sub?'<div class="v-sub">'+s.sub+'</div>':'')+'</div>'+cuePill(s.cue)+'</div>';
      typeLine(document.getElementById('L'),s.a,s.it,my);
    } else if(s.type==='reveal'){
      screen.innerHTML='<div class="view" style="padding:42px 24px 0">'+
        '<div class="topbar">'+brand+'<div class="burger"><i></i><i></i><i></i></div></div>'+
        '<div class="glow"></div>'+
        '<h2 class="r-title">Your chart,<br><span class="it">played.</span></h2>'+
        '<p class="r-sub">Your exact birth frequencies, decoded into sound.</p>'+
        '<div class="freq">'+freqRows+'</div>'+cuePill(s.cue)+'</div>';
      countUp();
    } else if(s.type==='offer'){
      screen.innerHTML='<div class="view">'+brand+'<div class="orb"></div><div class="center">'+
        '<div class="eyebrow">Founder’s offer</div>'+
        '<div class="o-price"><s>$197</s><b>$97</b><span>/year</span></div>'+
        '<div class="line">Hear it for<br><span class="it">yourself.</span></div>'+
        '<div class="v-sub">7-day free trial. Nine minutes a day.<br>30-day money-back guarantee.</div>'+
        '<button class="screen-cta" id="cta">Reveal my frequencies</button></div></div>';
      var cta=document.getElementById('cta');
      cta.addEventListener('click',function(e){e.stopPropagation();cta.textContent='This is where checkout opens';});
    }
    setBars(0);
  }

  function go(n){ n=Math.max(0,Math.min(last,n)); idx=n; sceneStart=0; curFrac=0; render(); if(idx===last)pause(); }

  function loop(ts){
    if(!playing)return;
    if(!sceneStart)sceneStart=ts-curFrac*S[idx].dur;
    var d=S[idx].dur; var el=ts-sceneStart; curFrac=d?Math.min(1,el/d):1;
    bars[idx].style.transition='none'; bars[idx].style.width=(curFrac*100)+'%';
    if(d && el>=d){ if(idx<last){ go(idx+1); } else { pause(); } }
    raf=requestAnimationFrame(loop);
  }
  function play(){ if(idx===last){go(0);} playing=true; playBtn.innerHTML=ICON_PAUSE; sceneStart=0; cancelAnimationFrame(raf); raf=requestAnimationFrame(loop); }
  function pause(){ playing=false; playBtn.innerHTML=ICON_PLAY; cancelAnimationFrame(raf); setBars(curFrac); }
  function toggle(){ playing?pause():play(); }

  // controls
  playBtn.innerHTML=ICON_PLAY;
  playBtn.addEventListener('click',function(e){e.stopPropagation();toggle();});
  document.getElementById('next').addEventListener('click',function(e){e.stopPropagation();go(idx+1);});
  document.getElementById('prev').addEventListener('click',function(e){e.stopPropagation();go(idx-1);});
  document.getElementById('restart').addEventListener('click',function(e){e.stopPropagation();pause();go(0);});
  // tap the phone to advance + pause (think it through)
  document.getElementById('stage').addEventListener('click',function(e){ if(e.target.closest('.screen-cta'))return; pause(); go(idx+1); });

  var _q=new URLSearchParams(location.search); if(_q.has('scene')){idx=Math.min(last,Math.max(0,parseInt(_q.get('scene'),10)||0));}
  render();
})();
</script>
</body>
</html>
