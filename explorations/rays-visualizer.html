<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Zodiac — music rays (on beat)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0B0712;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#c{display:block;width:100vw;height:100vh}
.ui{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);display:flex;gap:8px;align-items:center;
  background:rgba(20,14,28,.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 8px;z-index:10}
.ui button{background:transparent;border:none;color:#b9b2c6;font-size:12.5px;font-weight:600;letter-spacing:.02em;
  padding:8px 15px;border-radius:999px;cursor:pointer;transition:.15s}
.ui button.on{background:#fff;color:#1a1620}
.ui .div{width:1px;height:20px;background:rgba(255,255,255,.14);margin:0 3px}
.cap{position:fixed;top:26px;left:50%;transform:translateX(-50%);color:#6f6880;font-size:11px;letter-spacing:.16em;text-transform:uppercase;z-index:10}
</style></head><body>
<canvas id="c"></canvas>
<div class="cap">The Sound of You · music rays on beat</div>
<div class="ui">
  <button data-mode="spectrum" class="on">All four</button>
  <button data-mode="core">Core</button>
  <button data-mode="love">Love</button>
  <button data-mode="vitality">Vitality</button>
  <button data-mode="abundance">Abundance</button>
  <div class="div"></div>
  <button data-bpm="76">Slow</button>
  <button data-bpm="104" class="on">Beat</button>
  <button data-bpm="140">Fast</button>
</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR;
function size(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
size();addEventListener('resize',size);

// governed palette: the four frequencies, primary -> bright end (green Abundance included)
const FR={
  core:['#6521C9','#A737C8'], love:['#B90044','#CF4090'],
  vitality:['#FF9112','#FFC251'], abundance:['#12A56E','#46D99A']
};
const ORDER=['core','love','vitality','abundance'];
function hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function mix(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
function rgba(c,a){return `rgba(${c[0]},${c[1]},${c[2]},${a})`;}
// build a smooth color for angle position p (0..1) around the wheel through the 4 bright ends
const ENDS=ORDER.map(k=>hx(FR[k][1]));
const PRIM=ORDER.map(k=>hx(FR[k][0]));
function wheelColor(p){ // p 0..1 -> one of 4 anchors, smoothly blended
  const f=p*4, i=Math.floor(f)%4, t=f-Math.floor(f);
  return mix(ENDS[i],ENDS[(i+1)%4],t);
}

let mode='spectrum', bpm=104, beatLen=60/bpm*1000, t0=performance.now(), rot=0;
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;
  document.querySelectorAll('[data-mode]').forEach(o=>o.classList.toggle('on',o===b));});
document.querySelectorAll('[data-bpm]').forEach(b=>b.onclick=()=>{bpm=+b.dataset.bpm;beatLen=60/bpm*1000;
  document.querySelectorAll('[data-bpm]').forEach(o=>o.classList.toggle('on',o===b));});

// beat envelope: sharp attack, soft decay, 0..1
const PEAK=new URLSearchParams(location.search).has('peak');
function beatEnv(now){
  if(PEAK) return 0.92;                   // debug: freeze at beat peak for still capture
  const phase=((now-t0)%beatLen)/beatLen; // 0..1 within a beat
  // attack in first 12%, decay rest
  let e = phase<0.12 ? (phase/0.12) : Math.pow(1-(phase-0.12)/0.88,1.7);
  return e;
}
const RAYS=48;
function frame(now){
  x.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2;
  const env=beatEnv(now);
  rot += 0.0011 + env*0.004;           // rotate faster on the beat
  const baseR=Math.min(W,H)*0.095;
  const maxR =Math.min(W,H)*0.40;
  const reach=baseR + (maxR-baseR)*(0.62+0.38*env);   // rays grow on beat

  // central core glow
  const coreCol = mode==='spectrum'? [240,232,255] : mix(ENDS[ORDER.indexOf(mode)],[255,255,255],0.5);
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,baseR*(1.3+0.6*env));
  cg.addColorStop(0,rgba(coreCol,0.95)); cg.addColorStop(0.45,rgba(coreCol,0.3)); cg.addColorStop(1,rgba(coreCol,0));
  x.fillStyle=cg; x.beginPath(); x.arc(cx,cy,baseR*(1.8+0.7*env),0,7); x.fill();

  x.globalCompositeOperation='lighter'; // additive glow like real light
  for(let i=0;i<RAYS;i++){
    const p=i/RAYS;
    const ang=p*Math.PI*2 + rot;
    const jitter=0.5+0.5*Math.sin(now*0.002 + i*0.7);  // shimmer, not rigid
    const rr=reach*(0.70+0.30*jitter);
    let col;
    if(mode==='spectrum'){ col=wheelColor((p+rot*0.04)%1); }  // vivid bright ends around the wheel
    else { const pr=PRIM[ORDER.indexOf(mode)], en=ENDS[ORDER.indexOf(mode)]; col=mix(pr,en,0.35+0.65*jitter); }
    const x1=cx+Math.cos(ang)*baseR, y1=cy+Math.sin(ang)*baseR;
    const x2=cx+Math.cos(ang)*rr,   y2=cy+Math.sin(ang)*rr;
    const g=x.createLinearGradient(x1,y1,x2,y2);
    const a=0.34+0.55*env*(0.55+0.45*jitter);           // brighter base so colours always read
    g.addColorStop(0,rgba(col,a)); g.addColorStop(0.65,rgba(col,a*0.55)); g.addColorStop(1,rgba(col,0));
    x.strokeStyle=g; x.lineWidth=(Math.min(W,H)*0.010)*(0.7+0.6*jitter); x.lineCap='round';
    x.beginPath(); x.moveTo(x1,y1); x.lineTo(x2,y2); x.stroke();
    // a bright dot at the ray tip on the beat
    if(env>0.3){ x.fillStyle=rgba(mix(col,[255,255,255],0.3),(env-0.3)*0.7); x.beginPath(); x.arc(x2,y2,Math.min(W,H)*0.008*jitter,0,7); x.fill(); }
  }
  x.globalCompositeOperation='source-over';
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body></html>
