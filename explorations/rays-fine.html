<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Zodiac — fine ray disc (app)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0712;color:#cfc8d8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
.cap{text-align:center;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6f6880;padding:24px 0 4px}
.sub{text-align:center;font-size:13px;color:#8b8598;max-width:46ch;margin:0 auto 18px}
.contexts{display:flex;gap:34px;justify-content:center;align-items:flex-end;flex-wrap:wrap;padding:10px 20px 26px;border-bottom:1px solid rgba(255,255,255,.07)}
.ctx{text-align:center}
.ctx .lbl{font-size:10.5px;color:#6f6880;margin-top:9px;letter-spacing:.04em}
.tile{background:#FBF8F3;border-radius:12px;padding:0;display:inline-block;overflow:hidden}
.tileC{border-radius:12px;background:#FBF8F3;display:block}
.mini{background:#fff;border-radius:10px;display:inline-flex;align-items:center;gap:9px;padding:8px 12px 8px 8px}
.mini .mt{width:42px;height:42px;border-radius:9px;overflow:hidden;background:#FBF8F3}
.mini .txt b{font-family:Georgia,serif;font-size:12.5px;color:#1a1620;display:block}
.mini .txt span{font-size:10px;font-weight:700}
.np{background:#0B0712;border-radius:16px;padding:10px}
.stage{display:flex;justify-content:center;padding:30px 0 20px}
.ui{display:flex;gap:8px;justify-content:center;align-items:center;padding:0 0 46px}
.ui button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#b9b2c6;font-size:12.5px;font-weight:600;padding:8px 15px;border-radius:999px;cursor:pointer}
.ui button.on{background:#fff;color:#1a1620;border-color:#fff}
canvas{display:block}
</style></head><body>
<div class="cap">Fine ray disc · the app treatment</div>
<div class="sub">Hairline rays, precise even at the smallest size. Same disc, four real app contexts. It stays crisp because the lines are fine and the petal silhouette carries the shape.</div>

<div class="contexts">
  <div class="ctx"><span class="tile"><canvas class="tileC" id="cTile" width="148" height="148" style="width:74px;height:74px"></canvas></span><div class="lbl">list tile · 74px</div></div>
  <div class="ctx"><span class="mini"><span class="mt"><canvas id="cMini" width="84" height="84" style="width:42px;height:42px"></canvas></span><span class="txt"><b>Kindred Spirits</b><span id="miniLab">Abundance</span></span></span><div class="lbl">mini player · 42px</div></div>
  <div class="ctx"><span class="np"><canvas id="cNp" width="320" height="320" style="width:160px;height:160px"></canvas></span><div class="lbl">now playing · 160px</div></div>
</div>

<div class="stage"><canvas id="cBig" width="720" height="720" style="width:360px;height:360px"></canvas></div>
<div class="ui">
  <button data-f="core">Core</button>
  <button data-f="love">Love</button>
  <button data-f="vitality">Vitality</button>
  <button data-f="abundance" class="on">Abundance</button>
</div>

<script>
const FR={core:['#6521C9','#A737C8'],love:['#B90044','#CF4090'],vitality:['#FF9112','#FFC251'],abundance:['#12A56E','#46D99A']};
const LAB={core:'Core',love:'Love',vitality:'Vitality',abundance:'Abundance'};
let freq='abundance', t0=performance.now();
function hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function mix(a,b,t){return a.map((v,i)=>v+(b[i]-v)*t);}
function rgba(c,a){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;}

// smooth organic petal envelope, stable per frequency
function envelope(a, tt){
  return 1
    + 0.15*Math.sin(a*11 + Math.sin(tt*0.4))
    + 0.09*Math.sin(a*7  - tt*0.25)
    + 0.05*Math.sin(a*17 + tt*0.5);
}
function beat(tt){ // gentle breathing, ~0.9Hz
  const p=(tt*0.9)%1; return p<0.14?p/0.14:Math.pow(1-(p-0.14)/0.86,1.6);
}
function drawDisc(cv, dark){
  const x=cv.getContext('2d'); const W=cv.width,H=cv.height; x.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2; const tt=(performance.now()-t0)/1000;
  const pr=hx(FR[freq][0]), en=hx(FR[freq][1]);
  const env=beat(tt);
  const R = Math.min(W,H)*0.46;
  const r0= Math.min(W,H)*0.085;
  const rot= tt*0.05;
  // ray count scales with size but stays dense for fineness
  const N = Math.max(90, Math.min(220, Math.round(W*0.9)));
  // on light, a whisper of frequency tint behind so small tiles read
  if(!dark){ const tg=x.createRadialGradient(cx,cy,r0,cx,cy,R*0.9);
    tg.addColorStop(0,rgba(en,0.10)); tg.addColorStop(1,rgba(en,0));
    x.fillStyle=tg; x.beginPath(); x.arc(cx,cy,R,0,7); x.fill(); }
  x.lineCap='round';
  x.globalCompositeOperation = dark ? 'lighter' : 'source-over';
  for(let i=0;i<N;i++){
    const a = i/N*Math.PI*2 + rot;
    const e = envelope(a, tt);
    const len = R * (0.62 + 0.34*e) * (0.94+0.06*env);
    const x1=cx+Math.cos(a)*r0, y1=cy+Math.sin(a)*r0;
    const x2=cx+Math.cos(a)*len, y2=cy+Math.sin(a)*len;
    const g=x.createLinearGradient(x1,y1,x2,y2);
    const c1=dark?mix(pr,en,0.2):pr, c2=en;
    const aOut = dark?0:0.0;
    g.addColorStop(0, rgba(c1, dark?0.55:1));
    g.addColorStop(0.7, rgba(c2, dark?0.35:0.7));
    g.addColorStop(1, rgba(c2, 0));
    x.strokeStyle=g;
    x.lineWidth = Math.max(0.7, W/720*1.25);   // hairline, scales with canvas
    x.beginPath(); x.moveTo(x1,y1); x.lineTo(x2,y2); x.stroke();
  }
  // fine open centre + soft core
  const core=x.createRadialGradient(cx,cy,0,cx,cy,r0*1.6);
  if(dark){core.addColorStop(0,rgba(mix(en,[255,255,255],0.5),0.9));core.addColorStop(1,rgba(en,0));}
  else{core.addColorStop(0,'rgba(255,255,255,0.9)');core.addColorStop(0.6,rgba(pr,0.10));core.addColorStop(1,rgba(pr,0));}
  x.globalCompositeOperation='source-over';
  x.fillStyle=core; x.beginPath(); x.arc(cx,cy,r0*1.8,0,7); x.fill();
  // crisp open white centre (the "eye")
  x.fillStyle = dark? '#0B0712' : '#FBF8F3';
  x.beginPath(); x.arc(cx,cy,r0*0.5,0,7); x.fill();
}
const cTile=document.getElementById('cTile'),cMini=document.getElementById('cMini'),cNp=document.getElementById('cNp'),cBig=document.getElementById('cBig');
function loop(){ drawDisc(cTile,false); drawDisc(cMini,false); drawDisc(cNp,true); drawDisc(cBig,true); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{freq=b.dataset.f;
  document.querySelectorAll('[data-f]').forEach(o=>o.classList.toggle('on',o===b));
  const ml=document.getElementById('miniLab'); ml.textContent=LAB[freq]; ml.style.color=FR[freq][0];});
document.getElementById('miniLab').style.color=FR['abundance'][0];
</script>
</body></html>
