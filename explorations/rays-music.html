<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Zodiac — reactive music visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#07040d;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#c{display:block;width:100vw;height:100vh;position:fixed;inset:0}
.cap{position:fixed;top:24px;left:24px;color:#5f5872;font-size:11px;letter-spacing:.18em;text-transform:uppercase;z-index:5}
#start{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;cursor:pointer;background:radial-gradient(circle at 50% 45%,rgba(30,20,44,.5),rgba(7,4,13,.92))}
#start .play{width:96px;height:96px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;transition:.2s}
#start:hover .play{border-color:#fff;transform:scale(1.05)}
#start .play svg{width:34px;height:34px;fill:#fff;margin-left:5px}
#start .t{color:#efe8f6;font-family:Georgia,serif;font-size:22px;margin-top:22px}
#start .s{color:#8b8598;font-size:13px;margin-top:6px}
.cats{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:6;opacity:0;transition:.4s}
.cats.show{opacity:1}
.cats button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#b9b2c6;font-size:12px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer}
.cats button.on{background:#fff;color:#1a1620;border-color:#fff}
/* frequency proof panel */
#proofwrap{position:fixed;left:0;right:0;bottom:0;height:132px;z-index:6;padding:14px 22px 18px;
  background:linear-gradient(rgba(7,4,13,0),rgba(7,4,13,.7) 40%,rgba(7,4,13,.92));opacity:0;transition:.5s}
#proofwrap.show{opacity:1}
.plabel{display:flex;justify-content:space-between;align-items:baseline;color:#9a93a8;font-size:12px;margin-bottom:6px}
.plabel b{font-family:Georgia,serif;font-size:15px;color:#efe8f6}
.plabel .hz{font-weight:700;letter-spacing:.02em}
#proof{display:block;width:100%;height:78px}
.note{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);color:#5f5872;font-size:10.5px;z-index:6;opacity:0;transition:.5s}
.note.show{opacity:1}
</style></head><body>
<canvas id="c"></canvas>
<div class="cap">The Sound of You · reactive visualizer</div>
<div class="cats" id="cats">
  <button data-cat="core">Core · 432</button>
  <button data-cat="love">Love · 528</button>
  <button data-cat="vitality">Vitality · 594</button>
  <button data-cat="abundance" class="on">Abundance · 611</button>
</div>
<div id="start">
  <div class="play"><svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg></div>
  <div class="t">Play your frequency</div>
  <div class="s">a real track · tuned to one frequency</div>
</div>
<div id="proofwrap">
  <div class="plabel"><span>The tuned frequency, measured live in the track</span><b class="hz" id="hzlab">611 Hz</b></div>
  <canvas id="proof"></canvas>
</div>
<div class="note" id="note">Loud at the open, softer through the middle, back at the close. That is the embedded frequency, on pace.</div>
<script>
const PAL={
  core:{dom:['#6521C9','#A737C8'],sec:[['#7A4AE0','#B98AF0'],['#C24FA8','#E07AC8']],hz:432,name:'Astrolith'},
  love:{dom:['#B90044','#CF4090'],sec:[['#E8663E','#F0A070'],['#D8489A','#EE8CC0']],hz:528,name:'Elysian Surge'},
  vitality:{dom:['#FF9112','#FFC251'],sec:[['#F0592E','#F59060'],['#FFD37A','#FFE7B0']],hz:594,name:'Quiet Success'},
  abundance:{dom:['#12A56E','#46D99A'],sec:[['#15B8A6','#5FE0D2'],['#D9B45A','#F0D28A']],hz:611,name:'Kindred Spirits'}
};
let cat='abundance';
const cv=document.getElementById('c'),x=cv.getContext('2d');
const pf=document.getElementById('proof'),px=pf.getContext('2d');
let W,H,DPR,PW,PH;
function size(){DPR=Math.min(devicePixelRatio||1,2);
  W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  PW=pf.width=pf.clientWidth*DPR;PH=pf.height=pf.clientHeight*DPR;}
size();addEventListener('resize',size);
function hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function mix(a,b,t){return a.map((v,i)=>v+(b[i]-v)*t);}
function rgba(c,a){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;}

// ---- audio ----
let an, freqData, timeData, playing=false, fake=false, t0=performance.now(), sampleRate=44100;
const NB=640;
let targetHist=new Float32Array(240), thi=0;   // rolling history of the tuned-frequency level
function startAudio(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; const ac=new AC(); sampleRate=ac.sampleRate;
    const audio=new Audio('../inapp/'+ (cat==='abundance'?'elysian-sky-600hz.mp3':'elysian-sky-600hz.mp3'));
    audio.crossOrigin='anonymous'; audio.loop=true;
    const srcN=ac.createMediaElementSource(audio);
    an=ac.createAnalyser(); an.fftSize=4096; an.smoothingTimeConstant=0.8;
    srcN.connect(an); an.connect(ac.destination);
    freqData=new Uint8Array(an.frequencyBinCount); timeData=new Uint8Array(an.fftSize);
    ac.resume(); audio.play().then(()=>playing=true).catch(startFake); audio.onerror=startFake;
  }catch(e){ startFake(); }
}
function startFake(){ fake=true; playing=true; freqData=new Uint8Array(NB); timeData=new Uint8Array(NB); }
function readFake(){
  const tt=(performance.now()-t0)/1000; const beat=0.6+0.4*Math.max(0,Math.sin(tt*2.2));
  for(let i=0;i<NB;i++){ const f=i/NB;
    let v=150*Math.exp(-f*2.4)*(0.55+0.45*Math.sin(tt*3+f*18));
    v+=95*Math.exp(-Math.abs(f-0.34)*7)*(0.5+0.5*Math.sin(tt*5+f*22));
    v+=70*Math.exp(-Math.abs(f-0.7)*9)*(0.5+0.5*Math.sin(tt*8-f*30));
    v*=beat; freqData[i]=Math.min(255,v);
    timeData[i]=128+80*Math.sin(tt*6+i*0.35)*Math.exp(-i/NB*1.4);
  }
}
// the tuned-frequency level: real = amplitude at the target bin; fake = the U-shaped arc
function targetLevel(){
  if(fake){ const songT=((performance.now()-t0)/1000)%26/26;   // 26s demo loop
    const U=0.35+0.65*Math.pow(Math.abs(songT-0.5)*2,1.6);      // loud ends, soft middle
    return Math.min(1,U*(0.7+0.3*Math.max(0,Math.sin((performance.now()-t0)/1000*3)))); }
  const hz=PAL[cat].hz; const bin=Math.round(hz/(sampleRate/2)*freqData.length);
  let s=0,n=0; for(let k=-2;k<=2;k++){const b=bin+k; if(b>=0&&b<freqData.length){s+=freqData[b];n++;}}
  return (s/Math.max(1,n))/255;
}
document.getElementById('start').onclick=function(){ this.style.display='none';
  document.getElementById('cats').classList.add('show'); document.getElementById('proofwrap').classList.add('show'); document.getElementById('note').classList.add('show');
  startAudio(); };
if(new URLSearchParams(location.search).has('demo')){ document.getElementById('start').style.display='none';
  ['cats','proofwrap','note'].forEach(id=>document.getElementById(id).classList.add('show')); startFake();
  for(let i=0;i<targetHist.length;i++){ const s=i/(targetHist.length-1); targetHist[i]=0.32+0.6*Math.pow(Math.abs(s-0.5)*2,1.5)*(0.85+0.15*Math.sin(i*0.7)); } thi=0; }
document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;
  document.querySelectorAll('[data-cat]').forEach(o=>o.classList.toggle('on',o===b));
  document.getElementById('hzlab').textContent=PAL[cat].hz+' Hz';});

function sample(arr,n){ const out=new Float32Array(n); const src=fake?arr.length:Math.floor(arr.length*0.5);
  for(let i=0;i<n;i++){ const p=Math.pow(i/n,1.35); out[i]=arr[Math.min(arr.length-1,Math.floor(p*src))]/255; } return out; }

let rot=0, smoothBass=0, frameC=0;
function frame(){
  x.fillStyle='rgba(7,4,13,0.32)'; x.fillRect(0,0,W,H);
  if(playing){
    if(fake) readFake(); else an.getByteFrequencyData(freqData);
    const cx=W/2, cy=H*0.42, base=Math.min(W,H);
    const P=PAL[cat], dom0=hx(P.dom[0]),dom1=hx(P.dom[1]);
    const s0a=hx(P.sec[0][0]),s0b=hx(P.sec[0][1]),s1a=hx(P.sec[1][0]),s1b=hx(P.sec[1][1]);
    const spec=sample(freqData,NB);
    let bass=0; for(let i=0;i<24;i++) bass+=spec[i]; bass/=24; smoothBass+=(bass-smoothBass)*0.2;
    rot+=0.0011+smoothBass*0.014;
    const tgt=targetLevel();
    // record target history for the proof trace
    if(frameC++%3===0){ targetHist[thi%targetHist.length]=tgt; thi++; }

    x.globalCompositeOperation='lighter';
    const r0=base*0.06;
    // base ring
    x.strokeStyle=rgba(dom0,0.12); x.lineWidth=Math.max(1,base*0.0008);
    x.beginPath(); x.arc(cx,cy,r0*1.1,0,7); x.stroke();
    // finer symmetric reactive star: category-dominant with a few secondary glints
    const half=NB;
    for(let i=0;i<half;i++){
      const frac=i/half, amp=spec[i];
      let cA=dom0,cB=dom1,mul=1;
      if(i%7===0){cA=s0a;cB=s0b;mul=0.75;} else if(i%11===0){cA=s1a;cB=s1b;mul=0.75;}
      const len=r0+base*(0.04+0.37*amp);
      for(const s of [1,-1]){
        const a=-Math.PI/2+s*frac*Math.PI+rot;
        const x1=cx+Math.cos(a)*r0,y1=cy+Math.sin(a)*r0,x2=cx+Math.cos(a)*len,y2=cy+Math.sin(a)*len;
        const g=x.createLinearGradient(x1,y1,x2,y2);
        g.addColorStop(0,rgba(cA,(0.09+0.5*amp)*mul)); g.addColorStop(0.75,rgba(cB,(0.06+0.22*amp)*mul)); g.addColorStop(1,rgba(cB,0));
        x.strokeStyle=g; x.lineWidth=Math.max(0.6,base*0.0011);   // finer
        x.beginPath(); x.moveTo(x1,y1); x.lineTo(x2,y2); x.stroke();
        if(amp>0.62){ x.fillStyle=rgba(mix(cB,[255,255,255],0.4),(amp-0.62)*0.7); x.beginPath(); x.arc(x2,y2,base*0.0016,0,7); x.fill(); }
      }
    }
    // a subtle inner ring hugging the core, brightening with the tuned-frequency level (proof, in the art)
    const tr=r0*(1.5+0.25*tgt);
    x.strokeStyle=rgba(mix(dom1,[255,255,255],0.45),0.12+0.5*tgt); x.lineWidth=Math.max(1,base*0.0012);
    x.beginPath(); x.arc(cx,cy,tr,0,7); x.stroke();
    // tight core
    const cr=base*(0.02+0.04*smoothBass);
    const cg=x.createRadialGradient(cx,cy,0,cx,cy,cr*2.6); const cc=mix([240,232,255],dom0,0.3);
    cg.addColorStop(0,rgba(cc,0.95)); cg.addColorStop(0.45,rgba(cc,0.3)); cg.addColorStop(1,rgba(cc,0));
    x.fillStyle=cg; x.beginPath(); x.arc(cx,cy,cr*2.6,0,7); x.fill();
    x.globalCompositeOperation='source-over';
    drawProof(P);
  }
  requestAnimationFrame(frame);
}
// the app-style proof: 250-950 axis on the left with the target tick highlighted, and a live trace of the tuned frequency over time
function drawProof(P){
  px.clearRect(0,0,PW,PH);
  const dom0=hx(P.dom[0]),dom1=hx(P.dom[1]);
  // left: a small 250-950 pitch scale showing WHERE the tuned frequency sits (echoes the app)
  const axX=PW*0.055, lo=250,hi=950, yFor=v=>PH*0.86-(v-lo)/(hi-lo)*PH*0.64;
  px.strokeStyle='rgba(255,255,255,.14)'; px.lineWidth=DPR;
  px.beginPath(); px.moveTo(axX,yFor(hi)); px.lineTo(axX,yFor(lo)); px.stroke();
  px.fillStyle='rgba(255,255,255,.30)'; px.font=(9.5*DPR)+'px -apple-system,sans-serif'; px.textAlign='right';
  [250,950].forEach(v=>px.fillText(v,axX-6*DPR,yFor(v)+3*DPR));
  const ty=yFor(P.hz);   // target tick on the pitch scale
  px.fillStyle=rgba(mix(dom1,[255,255,255],0.4),1); px.beginPath(); px.arc(axX,ty,3.4*DPR,0,7); px.fill();
  px.font=('700 '+(10.5*DPR)+'px -apple-system,sans-serif'); px.textAlign='left';
  px.fillText(P.hz+' Hz',axX+8*DPR,ty+3.5*DPR);
  // main: the tuned frequency's LEVEL over the song timeline (loud ends, soft middle = the arc)
  const gx0=PW*0.20, gw=PW-gx0-PW*0.02, yB=PH*0.9;
  const n=targetHist.length;
  px.beginPath(); px.moveTo(gx0,yB);
  for(let i=0;i<n;i++){ const lvl=targetHist[(thi+i)%n]; px.lineTo(gx0+i/(n-1)*gw, yB-lvl*PH*0.72); }
  px.lineTo(gx0+gw,yB); px.closePath();
  const fg=px.createLinearGradient(0,yB-PH*0.72,0,yB); fg.addColorStop(0,rgba(dom0,0.4)); fg.addColorStop(1,rgba(dom0,0.03));
  px.fillStyle=fg; px.fill();
  px.beginPath();
  for(let i=0;i<n;i++){ const lvl=targetHist[(thi+i)%n]; const gx=gx0+i/(n-1)*gw, gy=yB-lvl*PH*0.72; i?px.lineTo(gx,gy):px.moveTo(gx,gy); }
  px.strokeStyle=rgba(mix(dom0,[255,255,255],0.35),0.9); px.lineWidth=1.7*DPR; px.stroke();
  // playing-now dot (pink)
  const cur=targetHist[(thi-1+n)%n], gy=yB-cur*PH*0.72;
  px.fillStyle='rgba(255,120,180,0.95)'; px.beginPath(); px.arc(gx0+gw,gy,3.6*DPR,0,7); px.fill();
}
requestAnimationFrame(frame);
</script>
</body></html>
