<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player 03 · Zodiac Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap" rel="stylesheet">
<style>
  :root{
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Switzer',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --st:#6521C9; --st-deep:#38007A; --st-soft:#D2C8FF; --st-tint:#EFECFF; --st-text:#6521C9;
  }
  html.light{
    --bg:#FFFFFF; --panel:#FBF8F3; --ink:#1A1620; --dim:rgba(26,22,32,.52); --faint:rgba(26,22,32,.32);
    --line:rgba(26,22,32,.12); --gold:#B27C10; --gold-glow:rgba(178,124,16,.45);
    --chip:#F3EFE8; --play-face:linear-gradient(135deg,var(--st),var(--st-deep)); --play-ico:#fff;
    --st-label:var(--st-text);
  }
  html.dark{
    --bg:#0B0712; --panel:#FBF8F3; --ink:#ECE7F2; --dim:rgba(236,231,242,.55); --faint:rgba(236,231,242,.34);
    --line:rgba(236,231,242,.14); --gold:#D9A32C; --gold-glow:rgba(217,163,44,.5);
    --chip:#1B1424; --play-face:#FBF8F3; --play-ico:#0B0712;
    --st-label:var(--st-soft);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .lab{max-width:480px;min-height:100svh;margin:0 auto;padding:22px 22px 26px;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between}
  header img{height:22px;display:block}
  .badge{background:var(--chip);border:1px solid var(--line);color:var(--dim);font:700 10.5px/1 var(--sans);letter-spacing:.1em;padding:7px 11px;border-radius:999px}

  .readout{text-align:center;margin-top:16px}
  .readout .num{font-size:76px;font-weight:700;letter-spacing:-.03em;line-height:.9;font-variant-numeric:tabular-nums}
  .readout .hz{font-size:20px;font-weight:600;color:var(--dim);margin-left:6px}
  .readout .who{margin-top:12px;font-size:11.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--st-label);transition:color .4s}
  .readout .role{font-size:12.5px;color:var(--faint);margin-top:5px;letter-spacing:.02em}

  .dial{margin-top:18px}
  #dialCv{width:100%;height:64px;display:block}

  .presets{display:flex;gap:8px;margin-top:16px}
  .presets button{flex:1;border:1px solid var(--line);background:transparent;border-radius:14px;padding:10px 2px 9px;cursor:pointer;font-family:var(--sans);transition:all .25s;color:var(--dim)}
  .presets button .d{display:block;width:9px;height:9px;border-radius:50%;margin:0 auto 7px;background:var(--pc)}
  .presets button b{display:block;font-size:12.5px;font-weight:600;color:inherit}
  .presets button span{display:block;font-size:10.5px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums}
  .presets button.on{border-color:transparent;background:var(--pt);color:var(--pl)}
  .presets button.on span{color:var(--pl);opacity:.75}

  /* THE SCREEN: the ORIGINAL viewer, untouched (a lit window on either chassis) */
  .screen{margin-top:16px;position:relative;height:230px;border-radius:20px;overflow:hidden;background:#FBF8F3;border:1px solid var(--line);cursor:pointer}
  html.dark .screen{box-shadow:0 0 0 1px rgba(236,231,242,.06),0 14px 40px rgba(0,0,0,.5)}
  .screen iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;pointer-events:auto}
  .screen.song iframe{display:block}
  .screen.song #toneCv{display:none}
  #toneCv{position:absolute;inset:0;width:100%;height:100%;display:block}
  #vload{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(251,248,243,.97);z-index:3;color:rgba(26,22,32,.75);font-size:13.5px;text-align:center;padding:0 24px}
  #vload.on{display:flex}
  #vload b{color:#8a6a13}
  #vload .dots{display:flex;gap:6px}
  #vload .dots i{width:6px;height:6px;border-radius:50%;background:#7B5FCB;animation:vp 1s ease-in-out infinite}
  #vload .dots i:nth-child(2){animation-delay:.2s}#vload .dots i:nth-child(3){animation-delay:.4s}
  @keyframes vp{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  #vhint{position:absolute;left:0;right:0;bottom:12px;display:none;text-align:center;z-index:4;color:#8a6a13;font-size:13px;font-weight:600;pointer-events:none}
  #vhint.on{display:block}

  .transport{display:flex;justify-content:center;margin-top:16px}
  #play{width:78px;height:78px;border-radius:50%;border:0;cursor:pointer;background:var(--play-face);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.18);transition:transform .15s}
  #play:active{transform:scale(.96)}
  #play svg{width:26px;height:26px;fill:var(--play-ico);margin-left:3px}
  #play.pause svg{margin-left:0}
  #play.pulse{animation:pp 1.6s ease-in-out infinite}
  @keyframes pp{0%,100%{box-shadow:0 10px 30px rgba(0,0,0,.18),0 0 0 0 var(--gold-glow)}50%{box-shadow:0 10px 30px rgba(0,0,0,.18),0 0 0 12px rgba(0,0,0,0)}}

  .chips{display:flex;gap:8px;justify-content:center;margin-top:16px}
  .chips button{border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:999px;padding:9px 15px;font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .chips button.on{background:var(--st);border-color:var(--st);color:#fff}
  html.dark .chips button.on{color:#0B0712;background:var(--st-soft);border-color:var(--st-soft)}
  .eq{display:none;gap:2px;height:9px;align-items:flex-end}
  .eq i{width:2px;background:currentColor;border-radius:2px;animation:eq .9s ease-in-out infinite;height:100%}
  .eq i:nth-child(2){animation-delay:.25s}.eq i:nth-child(3){animation-delay:.5s}
  @keyframes eq{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
  .chips button.on .eq{display:inline-flex}

  .cap{text-align:center;font-size:12px;color:var(--faint);margin-top:auto;padding-top:16px;line-height:1.5}
</style>
</head>
<body>
<div class="lab">
  <header>
    <img id="logo" src="../inapp/app-assets/logo-black.svg" alt="zodiac.fm">
    <div class="badge" id="badge">PLAYER 03 · LIGHT</div>
  </header>

  <div class="readout">
    <div><span class="num" id="num">422</span><span class="hz">Hz</span></div>
    <div class="who" id="who">Core · your station</div>
    <div class="role" id="role">Identity</div>
  </div>

  <div class="dial"><canvas id="dialCv"></canvas></div>

  <div class="presets" id="presets"></div>

  <div class="screen" id="viewer">
    <canvas id="toneCv"></canvas>
    <iframe id="vframe" title="Zodiac playing view" allow="autoplay"></iframe>
    <div id="vload"><div class="dots"><i></i><i></i><i></i></div><div>Tuning <b id="vloadSong">the song</b> to your <b id="vloadHz">422 Hz</b>&hellip;</div></div>
    <div id="vhint">Tap play to start</div>
  </div>

  <div class="transport">
    <button id="play" class="pulse" aria-label="Play or pause"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
  </div>

  <div class="chips" id="chips">
    <button data-src="tone" class="on"><span class="eq"><i></i><i></i><i></i></span>Tone &middot; <span id="toneHzLbl">422</span> Hz</button>
    <button data-src="quiet-success" data-title="Quiet Success"><span class="eq"><i></i><i></i><i></i></span>&#9834; Quiet Success</button>
    <button data-src="kindred-spirits" data-title="Kindred Spirits"><span class="eq"><i></i><i></i><i></i></span>&#9834; Kindred Spirits</button>
  </div>

  <div class="cap">Four frequencies, measured from your birth chart.<br>Tap a station. The tuner does the rest.</div>
</div>

<script>
/* ============ mode ============ */
const DARK = new URLSearchParams(location.search).get('mode')==='dark';
document.documentElement.classList.add(DARK?'dark':'light');
document.getElementById('badge').textContent = DARK?'PLAYER 03 · DARK':'PLAYER 03 · LIGHT';
document.getElementById('logo').src = DARK?'../inapp/app-assets/logo-cream.svg':'../inapp/app-assets/logo-black.svg';

/* ============ the four frequencies (the app's own palette) ============ */
const ST = [
  {k:'core',      name:'Core',      role:'Identity',      hz:422, c:'#6521C9', deep:'#38007A', soft:'#D2C8FF', tint:'#EFECFF', text:'#6521C9'},
  {k:'love',      name:'Love',      role:'Relationships', hz:432, c:'#B90044', deep:'#6E0024', soft:'#FFBDC3', tint:'#FFE8EA', text:'#B90044'},
  {k:'vitality',  name:'Vitality',  role:'Energy',        hz:579, c:'#FF9112', deep:'#BC6700', soft:'#FFC392', tint:'#FFEADA', text:'#C25500'},
  {k:'abundance', name:'Abundance', role:'Opportunity',   hz:611, c:'#12A56E', deep:'#0A6B48', soft:'#8FE1BE', tint:'#DCF4E8', text:'#0A7A52'}
];
const HZ0=380, HZ1=680;
let cur=0, shownHz=422, needleHz=422;
const $=id=>document.getElementById(id);
function hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgba(c,a){return 'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+a+')';}

ST.forEach((s,i)=>{
  const b=document.createElement('button');
  b.style.setProperty('--pc',s.c);
  b.style.setProperty('--pt',DARK?rgba(hx(s.c),.22):s.tint);
  b.style.setProperty('--pl',DARK?s.soft:s.text);
  b.innerHTML='<span class="d"></span><b>'+s.name+'</b><span>'+s.hz+' Hz</span>';
  b.addEventListener('click',()=>tune(i));
  $('presets').appendChild(b);
});
function paintPresets(){[...$('presets').children].forEach((b,i)=>b.classList.toggle('on',i===cur));}
paintPresets();

/* ================= THE ORIGINAL INSTRUMENT (ported verbatim from results/spin.html) ================= */
let source='tone';
let currentSong=null, capTimer=null;
const CAP=90;

/* ---- tone view: the original stage (gold line at TRUE height, waves around it) ---- */
const tcv=$('toneCv'); let tctx=tcv.getContext('2d'), toneRaf=null;
function tracked(text, cx, y, px, weight, color, track){
  tctx.font=weight+' '+px+'px Switzer, -apple-system, sans-serif'; tctx.fillStyle=color;
  tctx.textAlign='left'; tctx.textBaseline='top';
  const chs=[...text]; let total=0; const ws=chs.map(c=>{const w=tctx.measureText(c).width; total+=w+track; return w;}); total-=track;
  let x=cx-total/2;
  for(let i=0;i<chs.length;i++){ tctx.fillText(chs[i], x, y); x+=ws[i]+track; }
}
function toneSize(){ const r=$('viewer').getBoundingClientRect(), d=Math.min(devicePixelRatio||1,2);
  const w=Math.max(2,Math.round(r.width*d)), h=Math.max(2,Math.round(r.height*d));
  if (tcv.width!==w||tcv.height!==h){ tcv.width=w; tcv.height=h; } }
function drawTone(T, playing, prog){
  const W=tcv.width, H=tcv.height, cx=W/2, d=Math.min(devicePixelRatio||1,2);
  const f=ST[cur], col=hx(f.c);
  const yTop=H*0.34, yBot=H*0.78, fr=Math.max(0,Math.min(1,(f.hz-250)/700));
  const midY=yBot-(yBot-yTop)*fr;
  const g=tctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#FBF8F3'); g.addColorStop(0.55,'#F5EFE6'); g.addColorStop(1,'#F8F4EC');
  tctx.fillStyle=g; tctx.fillRect(0,0,W,H);
  const rw=tctx.createRadialGradient(cx,midY,0,cx,midY,W*0.6);
  rw.addColorStop(0,rgba(col, playing?0.10:0.05)); rw.addColorStop(1,'rgba(255,255,255,0)');
  tctx.fillStyle=rw; tctx.fillRect(0,0,W,H);
  const x0=W*0.15, x1=W*0.95;
  const amp=(playing? H*0.17*(0.65+0.35*Math.sin(T*2.2)) : H*0.085);
  tctx.beginPath();
  for(let xx=x0; xx<=x1; xx+=3*d){
    const ph=(xx/W)*10*Math.PI + (playing?T*4:0.8);
    const yy=midY + Math.sin(ph)*amp;
    xx===x0 ? tctx.moveTo(xx,yy) : tctx.lineTo(xx,yy);
  }
  tctx.strokeStyle=rgba(col, playing?0.9:0.55); tctx.lineWidth=2.2*d; tctx.lineCap='round'; tctx.stroke();
  tctx.beginPath();
  for(let xx=x0; xx<=x1; xx+=3*d){
    const ph=(xx/W)*10*Math.PI + (playing?T*4:0.8) + 1.2;
    const yy=midY + Math.sin(ph)*amp*0.55;
    xx===x0 ? tctx.moveTo(xx,yy) : tctx.lineTo(xx,yy);
  }
  tctx.strokeStyle=rgba(col, playing?0.30:0.16); tctx.lineWidth=5*d; tctx.stroke();
  tctx.shadowColor='rgba(178,124,16,0.55)'; tctx.shadowBlur=(playing?12:6)*d;
  tctx.strokeStyle='rgba(178,124,16,0.95)'; tctx.lineWidth=2*d;
  tctx.beginPath(); tctx.moveTo(x0,midY); tctx.lineTo(x1,midY); tctx.stroke(); tctx.shadowBlur=0;
  tctx.strokeStyle='rgba(26,22,32,0.12)'; tctx.lineWidth=1*d;
  tctx.beginPath(); tctx.moveTo(x0-3*d,yTop); tctx.lineTo(x0-3*d,yBot); tctx.stroke();
  tctx.textAlign='right'; tctx.textBaseline='middle'; tctx.font='500 '+(8*d)+'px Switzer, -apple-system, sans-serif'; tctx.fillStyle='rgba(26,22,32,0.32)';
  tctx.fillText('950 Hz', x0-9*d, yTop); tctx.fillText('250 Hz', x0-9*d, yBot);
  tctx.strokeStyle='rgba(178,124,16,0.9)'; tctx.lineWidth=1.6*d;
  tctx.beginPath(); tctx.moveTo(x0-7*d,midY); tctx.lineTo(x0,midY); tctx.stroke();
  tctx.textBaseline='middle'; tctx.textAlign='right';
  tctx.font='700 '+(11.5*d)+'px Switzer, -apple-system, sans-serif'; tctx.fillStyle='rgba(122,86,10,0.95)';
  tctx.fillText(f.hz+' Hz', x0-11*d, midY);
  tracked('PURE TONE', cx, 19*d, 12*d, '600', 'rgba(26,22,32,0.82)', 3.4*d);
  tracked('THE SOUND OF YOU', cx, 37*d, 8.5*d, '500', 'rgba(26,22,32,0.4)', 2.1*d);
  if(playing){
    tctx.textAlign='center'; tctx.textBaseline='bottom';
    tctx.font='500 '+(10.5*d)+'px Switzer, -apple-system, sans-serif'; tctx.fillStyle='rgba(26,22,32,0.6)';
    tctx.fillText('0:0'+Math.max(0,Math.ceil(10-prog))+' / 0:10', cx, H-14*d);
  } else {
    tctx.textAlign='center'; tctx.textBaseline='bottom';
    tctx.font='500 '+(11*d)+'px Switzer, -apple-system, sans-serif';
    tctx.fillStyle='rgba(178,124,16,0.9)'; tctx.fillText('The gold line is your tone.', cx, H-30*d);
    tctx.fillStyle='rgba(26,22,32,0.5)'; tctx.fillText('The music moves around it.', cx, H-14*d);
  }
}
function toneIdle(){ cancelAnimationFrame(toneRaf); toneSize(); drawTone(0,false,0); $('play').classList.add('pulse'); }

/* ---- raw tone audio: the original 10-second envelope ---- */
let actx=null, osc=null, gain=null, toneStart=0;
const TONE_LEN = 10;
function audioCtx(){ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); return actx; }
function stopTone(){
  if (osc){ try{ gain.gain.setTargetAtTime(0, actx.currentTime, .08); osc.stop(actx.currentTime + .4);}catch(e){} osc=null; }
  cancelAnimationFrame(toneRaf);
  if (source==='tone') toneIdle();
  setSrcPlaying(null);
}
function playTone(){
  const ctx = audioCtx();
  osc = ctx.createOscillator(); gain = ctx.createGain();
  osc.type = 'sine'; osc.frequency.value = ST[cur].hz;
  gain.gain.value = 0; osc.connect(gain); gain.connect(ctx.destination);
  osc.start();
  gain.gain.setTargetAtTime(.18, ctx.currentTime, .25);
  gain.gain.setTargetAtTime(0, ctx.currentTime + TONE_LEN - .8, .3);
  osc.stop(ctx.currentTime + TONE_LEN);
  const me = osc;
  osc.onended = () => { if (osc === me) stopTone(); };
  toneStart = performance.now();
  setSrcPlaying('tone');
  $('play').classList.remove('pulse');
  (function loop(){
    if (!osc) return;
    const t=(performance.now()-toneStart)/1000;
    toneSize(); drawTone(performance.now()/1000, true, Math.min(t,TONE_LEN));
    toneRaf=requestAnimationFrame(loop);
  })();
}

/* ---- play/pause: the big transport button; the screen also toggles ---- */
const ICO_PLAY='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const ICO_PAUSE='<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
function togglePlay(){
  if (source==='tone'){ if(osc) stopTone(); else playTone(); return; }
  try{ const w=$('vframe').contentWindow;
    if(w&&w.aud){ if(!w.aud.src){ return; }
      if(w.aud.paused){ if(w.startSound&&!w.aud.currentTime){ w.startSound(); } else { w.aud.play(); } }
      else { w.aud.pause(); } } }catch(e){}
}
$('play').addEventListener('click', togglePlay);
$('viewer').addEventListener('click', ()=>{ if (source==='tone') togglePlay(); });
setInterval(()=>{
  let playing=false;
  if (source==='tone') playing=!!osc;
  else { try{ const w=$('vframe').contentWindow; playing=!!(w&&w.aud&&w.aud.src&&!w.aud.paused); }catch(e){} }
  $('play').innerHTML = playing?ICO_PAUSE:ICO_PLAY;
  $('play').classList.toggle('pause',playing);
},300);

/* ---- songs: the app's ORIGINAL playing view, embedded ---- */
function loadSong(slug,title){
  const f=ST[cur];
  currentSong={slug,title};
  $('vframe').src='../inapp/frequency-visualizer-embed.html'
    + '?audio='+encodeURIComponent('./app-assets/'+slug+'.mp3')
    + '&target='+f.hz + '&title='+encodeURIComponent(title)
    + '&center=1&minui=1&light=1&wave='+encodeURIComponent(f.c)+'&r='+(slug.length*10000+f.hz);
  $('viewer').classList.add('song');
  $('vload').classList.add('on');
  $('vloadSong').textContent=title; $('vloadHz').textContent=f.hz+' Hz';
  clearInterval(capTimer);
  let ready=false, autoTried=0;
  capTimer=setInterval(()=>{
    try{
      const w=$('vframe').contentWindow;
      if(!w || !w.aud) return;
      if(!ready && w.aud.src){ ready=true; $('vload').classList.remove('on'); try{ w.dispatchEvent(new w.Event('resize')); }catch(e){} }
      if(ready && w.aud.paused && w.aud.currentTime<CAP && autoTried<4){ autoTried++; try{ w.startSound&&w.startSound(); }catch(e){} }
      if(ready && !w.aud.paused){ setSrcPlaying(slug); $('play').classList.remove('pulse'); $('vhint').classList.remove('on'); }
      if(ready && w.aud.paused){ setSrcPlaying(null); if(autoTried>=4 && !w.aud.currentTime){ $('play').classList.add('pulse'); $('vhint').classList.add('on'); } }
      if(w.aud.currentTime>=CAP && !w.aud.paused){ w.aud.pause(); }
    }catch(e){}
  },400);
}
function stopSong(){
  clearInterval(capTimer); currentSong=null;
  $('vframe').src='about:blank';
  $('viewer').classList.remove('song');
  $('vload').classList.remove('on');
  $('vhint').classList.remove('on');
}

/* ---- source switching (the original logic, chips instead of the seg row) ---- */
function setSrcPlaying(which){
  document.querySelectorAll('#chips button').forEach(b=>{
    const eq=b.querySelector('.eq');
    if(eq) eq.style.display = (which && b.dataset.src===which && b.classList.contains('on')) ? 'inline-flex' : 'none';
  });
}
function liveSwitch(slug,title){
  try{ const w=$('vframe').contentWindow;
    if(w && w.zSwitch && w.aud && w.aud.src){
      const f=ST[cur];
      w.zSwitch('./app-assets/'+slug+'.mp3', f.hz, title, f.c);
      currentSong={slug,title};
      return true; } }catch(e){}
  return false;
}
function setSource(src){
  source=src;
  document.querySelectorAll('#chips button').forEach(b=>b.classList.toggle('on', b.dataset.src===src));
  if(src==='tone'){ stopSong(); toneIdle(); playTone(); }
  else { stopTone();
    const btn=document.querySelector('#chips button[data-src="'+src+'"]');
    $('viewer').classList.add('song');
    if (!liveSwitch(src, btn.dataset.title)) loadSong(src, btn.dataset.title);
  }
}
document.querySelectorAll('#chips button').forEach(b=>b.addEventListener('click', ()=>{
  if (b.dataset.src===source){
    if (source==='tone'){ if(osc) stopTone(); else playTone(); return; }
    try{ const w=$('vframe').contentWindow;
      if(w&&w.aud&&w.aud.src){ if(w.aud.paused){ w.aud.play(); } else { w.aud.pause(); } return; } }catch(e){}
    return;
  }
  setSource(b.dataset.src);
}));

/* ---- tune(): station switch, the original re-tune behavior ---- */
function tune(i){
  if(i===cur){ paintPresets(); return; }
  cur=i;
  const s=ST[i], r=document.documentElement.style;
  r.setProperty('--st',s.c); r.setProperty('--st-deep',s.deep);
  r.setProperty('--st-soft',s.soft); r.setProperty('--st-tint',s.tint); r.setProperty('--st-text',s.text);
  $('who').textContent=s.name+' · your station';
  $('role').textContent=s.role;
  $('toneHzLbl').textContent=s.hz;
  paintPresets();
  if (source==='tone'){ if(osc){ stopTone(); playTone(); } else toneIdle(); }
  else if (currentSong){ if(!liveSwitch(currentSong.slug, currentSong.title)) loadSong(currentSong.slug, currentSong.title); }
}

/* ---- the dial (chrome only: needle + stations) ---- */
function stepAnim(){
  const t=ST[cur].hz;
  shownHz += (t-shownHz)*.12; if(Math.abs(t-shownHz)<.5)shownHz=t;
  needleHz += (t-needleHz)*.09; if(Math.abs(t-needleHz)<.05)needleHz=t;
  $('num').textContent=Math.round(shownHz);
}
const dcv=$('dialCv'); const dctx=dcv.getContext('2d');
function dialDraw(){
  const r=dcv.getBoundingClientRect(), d=Math.min(devicePixelRatio||1,2);
  const W=Math.round(r.width*d), H=Math.round(r.height*d);
  if(dcv.width!==W||dcv.height!==H){dcv.width=W;dcv.height=H;}
  dctx.clearRect(0,0,W,H);
  const pad=14*d, x0=pad, x1=W-pad, yTick=H*0.52;
  const X=hz=>x0+(x1-x0)*((hz-HZ0)/(HZ1-HZ0));
  const ink = DARK?[236,231,242]:[26,22,32];
  for(let hz=HZ0; hz<=HZ1; hz+=10){
    const big=hz%50===0, x=X(hz);
    dctx.strokeStyle=rgba(ink,big?.34:.14); dctx.lineWidth=1*d;
    dctx.beginPath(); dctx.moveTo(x,yTick-(big?11:6)*d); dctx.lineTo(x,yTick+(big?11:6)*d); dctx.stroke();
    if(big){ dctx.fillStyle=rgba(ink,.38); dctx.font='500 '+(8.5*d)+'px Switzer,sans-serif';
      dctx.textAlign='center'; dctx.textBaseline='top'; dctx.fillText(hz, x, yTick+15*d); }
  }
  dctx.strokeStyle=rgba(ink,.2); dctx.lineWidth=1*d;
  dctx.beginPath(); dctx.moveTo(x0,yTick); dctx.lineTo(x1,yTick); dctx.stroke();
  ST.forEach((s,i)=>{
    const x=X(s.hz), c=hx(s.c);
    dctx.fillStyle=rgba(c,i===cur?1:.45);
    dctx.beginPath(); dctx.arc(x,yTick,(i===cur?4.6:3.4)*d,0,7); dctx.fill();
  });
  const nx=X(needleHz), g=DARK?[217,163,44]:[178,124,16];
  dctx.shadowColor=rgba(g,.7); dctx.shadowBlur=10*d;
  dctx.strokeStyle=rgba(g,.95); dctx.lineWidth=2*d;
  dctx.beginPath(); dctx.moveTo(nx,yTick-18*d); dctx.lineTo(nx,yTick+18*d); dctx.stroke();
  dctx.shadowBlur=0;
  dctx.fillStyle=rgba(g,1);
  dctx.beginPath(); dctx.moveTo(nx,yTick-24*d); dctx.lineTo(nx-4*d,yTick-31*d); dctx.lineTo(nx+4*d,yTick-31*d); dctx.closePath(); dctx.fill();
}
dcv.addEventListener('click',e=>{
  const r=dcv.getBoundingClientRect(), frac=(e.clientX-r.left-14)/(r.width-28);
  const hz=HZ0+(HZ1-HZ0)*Math.max(0,Math.min(1,frac));
  let best=0,bd=1e9; ST.forEach((s,i)=>{const dd=Math.abs(s.hz-hz); if(dd<bd){bd=dd;best=i;}});
  tune(best);
});

(function loop(){ stepAnim(); dialDraw(); requestAnimationFrame(loop); })();
addEventListener('resize', ()=>{ if(source==='tone' && !osc) toneIdle(); });
toneIdle();
</script>
</body>
</html>
